4" lengthAdjust="spacing" textLength="146.1455" x="17259.36" y="1595.442">CompiledStateGraph</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="17254.36" x2="17367.672" y1="1574.2984" y2="1574.2984"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="17367.672" y="1578.6451">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="17418.3263" x2="17531.6383" y1="1574.2984" y2="1574.2984"/></g><!--class entrypoint_decorator--><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.entrypoint_decorator" data-source-line="1988" id="ent0375"><rect fill="#F5F0FF" height="109.1875" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="253.459" x="13767.27" y="1452.8119"/><ellipse cx="13815.935" cy="1468.8119" fill="#7B2FBE" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M13820.1694,1464.5775 L13814.8882,1464.5775 L13814.8882,1467.2494 L13819.685,1467.2494 L13819.685,1469.4056 L13814.8882,1469.4056 L13814.8882,1474.8119 L13812.4507,1474.8119 L13812.4507,1462.4213 L13820.1694,1462.4213 L13820.1694,1464.5775 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.6289" x="13836.435" y="1473.6586">entrypoint_decorator</text><line style="stroke:#181818;stroke-width:0.5;" x1="13768.27" x2="14019.729" y1="1484.8119" y2="1484.8119"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="13778.27" cy="1498.4603" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.459" x="13787.27" y="1501.807">checkpointer: BaseCheckpointer</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="13778.27" cy="1514.7572" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="116.2861" x="13787.27" y="1518.1039">store: BaseStore</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.0977" x="13773.27" y="1554.6976">CompiledEntrypoint</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="13768.27" x2="13868.6723" y1="1533.5541" y2="1533.5541"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="13868.6723" y="1537.9007">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="13919.3266" x2="14019.729" y1="1533.5541" y2="1533.5541"/></g><!--class task_decorator--><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.task_decorator" data-source-line="2004" id="ent0376"><rect fill="#F5F0FF" height="76.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="136.3779" x="14055.81" y="1469.1119"/><ellipse cx="14070.81" cy="1485.1119" fill="#7B2FBE" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M14075.0444,1480.8775 L14069.7631,1480.8775 L14069.7631,1483.5494 L14074.56,1483.5494 L14074.56,1485.7056 L14069.7631,1485.7056 L14069.7631,1491.1119 L14067.3256,1491.1119 L14067.3256,1478.7213 L14075.0444,1478.7213 L14075.0444,1480.8775 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.3779" x="14084.81" y="1489.9586">task_decorator</text><line style="stroke:#181818;stroke-width:0.5;" x1="14056.81" x2="14191.1879" y1="1501.1119" y2="1501.1119"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="32.5322" x="14061.81" y="1538.4039">Task</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="14056.81" x2="14098.6718" y1="1517.2603" y2="1517.2603"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="14098.6718" y="1521.607">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="14149.3261" x2="14191.1879" y1="1517.2603" y2="1517.2603"/></g><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.FuncAPINote" data-source-line="2019" id="ent0377"><path d="M14226.85,1388.9119 L14226.85,1625.9041 L14551.1474,1625.9041 L14551.1474,1398.9119 L14541.1474,1388.9119 L14226.85,1388.9119" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M14541.1474,1388.9119 L14541.1474,1398.9119 L14551.1474,1398.9119 L14541.1474,1388.9119" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.9678" x="14232.85" y="1405.9788">Functional API vs Graph API:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="14232.85" y="1421.1116">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.9863" x="14232.85" y="1436.2444">Functional API (@entrypoint + @task):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.5981" x="14241.1146" y="1451.3772">Pythonic; plain functions, no state schema,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.5913" x="14241.1146" y="1466.51">no explicit nodes or edges. Best for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.0571" x="14241.1146" y="1481.6428">linear or simple flows.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="14232.85" y="1496.7756">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.5171" x="14232.85" y="1511.9085">Graph API (StateGraph):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.7192" x="14241.1146" y="1527.0413">Explicit typed State, nodes, edges, reducers.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.9844" x="14241.1146" y="1542.1741">Use when you need conditional routing,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293.2871" x="14241.1146" y="1557.3069">parallel branches, subgraphs, or fine-grained</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.5439" x="14241.1146" y="1572.4397">state control.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="14232.85" y="1587.5725">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.29" x="14232.85" y="1602.7053">Both fully support: checkpointing, streaming,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.2974" x="14232.85" y="1617.8381">interrupt(), human-in-the-loop, and BaseStore.</text></g><g class="entity" data-qualified-name="PackageNote" data-source-line="22" id="ent0002"><path d="M12470.63,191.6719 L12470.63,731.3203 L12995.38,731.3203 L12995.38,201.6719 L12985.38,191.6719 L12470.63,191.6719" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M12985.38,191.6719 L12985.38,201.6719 L12995.38,201.6719 L12985.38,191.6719" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.0708" x="12476.63" y="208.7388">Modern install (v1.0):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.1055" x="12484.8946" y="223.8716">pip install langchain langchain-core</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.439" x="12484.8946" y="239.0044">pip install langchain-openai (or langchain-anthropic, etc.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.415" x="12484.8946" y="254.1372">pip install langgraph</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.5811" x="12484.8946" y="269.27">pip install langgraph-checkpoint-sqlite   (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.416" x="12484.8946" y="284.4028">pip install langgraph-checkpoint-postgres (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="12476.63" y="299.5356">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.1113" x="12476.63" y="314.6685">Key import paths:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.915" x="12484.8946" y="329.8013">Runnable / LCEL primitives   -&gt; langchain_core.runnables</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="421.7573" x="12484.8946" y="344.9341">Base model abstractions      -&gt; langchain_core.language_models</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.7905" x="12484.8946" y="360.0669">Messages                     -&gt; langchain_core.messages</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.5562" x="12484.8946" y="375.1997">Document                     -&gt; langchain_core.documents</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.2358" x="12484.8946" y="390.3325">Prompts                      -&gt; langchain_core.prompts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="379.6216" x="12484.8946" y="405.4653">Output parsers               -&gt; langchain_core.output_parsers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.4448" x="12484.8946" y="420.5981">Tools + @tool decorator      -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.3047" x="12484.8946" y="435.731">Injected tool args           -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="361.3784" x="12484.8946" y="450.8638">Embeddings                   -&gt; langchain_core.embeddings</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.2695" x="12484.8946" y="465.9966">Retrieval                    -&gt; langchain_core.retrievers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="351.2031" x="12484.8946" y="481.1294">Chat history                 -&gt; langchain_core.chat_history</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.6504" x="12484.8946" y="496.2622">Callbacks                    -&gt; langchain_core.callbacks</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.1255" x="12484.8946" y="511.395">Agents (high-level)          -&gt; langchain.agents [create_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="387.5562" x="12484.8946" y="526.5278">Middleware classes            -&gt; langchain.agents.middleware</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="408.9604" x="12484.8946" y="541.6606">Middleware hook decorators   -&gt; langchain.agents.middleware</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="386.2993" x="12484.8946" y="556.7935">Graph API (low-level)        -&gt; langgraph.graph [StateGraph]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="477.6294" x="12484.8946" y="571.9263">Prebuilt nodes               -&gt; langgraph.prebuilt [ToolNode, tools_condition]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="415.873" x="12484.8946" y="587.0591">Functional API               -&gt; langgraph.func [@entrypoint, @task]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="433.9766" x="12484.8946" y="602.1919">Prebuilt agent               -&gt; langgraph.prebuilt [create_react_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="491.1563" x="12484.8946" y="617.3247">Graph types/primitives       -&gt; langgraph.types [Command, Send, interrupt]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.416" x="12484.8946" y="632.4575">Runtime context              -&gt; langgraph.runtime [Runtime]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="452.1309" x="12484.8946" y="647.5903">Managed state values         -&gt; langgraph.managed [RemainingSteps]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="495.4854" x="12484.8946" y="662.7231">Checkpointers                -&gt; langgraph.checkpoint.memory [InMemorySaver]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.6592" x="12617.129" y="677.856">langgraph-checkpoint-sqlite (sep. pkg)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.7588" x="12617.129" y="692.9888">langgraph-checkpoint-postgres (sep. pkg)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="461.6396" x="12484.8946" y="708.1216">Node cache                   -&gt; langgraph.cache.memory [InMemoryCache]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="413.4419" x="12484.8946" y="723.2544">Errors                       -&gt; langgraph.errors [GraphRecursionError]</text></g><g class="entity" data-qualified-name="GMN25" data-source-line="171" id="ent0026"><path d="M28047.29,1010.9219 L28047.29,1066.3203 L28276.7153,1066.3203 L28276.7153,1020.9219 L28266.7153,1010.9219 L28047.29,1010.9219" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M28266.7153,1010.9219 L28266.7153,1020.9219 L28276.7153,1020.9219 L28266.7153,1010.9219" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.3267" x="28053.29" y="1027.9888">Built with the pipe operator:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.0098" x="28061.5546" y="1043.1216">prompt | model | parser</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.4253" x="28053.29" y="1058.2544">Every step must be a Runnable.</text></g><!--class BaseCheckpointer--><g class="entity" data-qualified-name="BaseCheckpointer" data-source-line="1649" id="ent0315"><rect fill="#F1F1F1" height="48" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="159.2305" x="16923.38" y="1014.6119"/><ellipse cx="16938.38" cy="1030.6119" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M16941.3488,1036.2525 Q16940.7706,1036.5494 16940.13,1036.69 Q16939.4894,1036.8463 16938.7863,1036.8463 Q16936.2863,1036.8463 16934.9581,1035.2056 Q16933.6456,1033.5494 16933.6456,1030.4244 Q16933.6456,1027.2994 16934.9581,1025.6431 Q16936.2863,1023.9