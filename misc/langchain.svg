"1500.9634" y2="1500.9634"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="17366.6718" y="1505.3101">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="17417.3261" x2="17459.1879" y1="1500.9634" y2="1500.9634"/></g><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.FuncAPINote" data-source-line="2013" id="ent0376"><path d="M17494.85,1372.615 L17494.85,1609.6072 L17819.1474,1609.6072 L17819.1474,1382.615 L17809.1474,1372.615 L17494.85,1372.615" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M17809.1474,1372.615 L17809.1474,1382.615 L17819.1474,1382.615 L17809.1474,1372.615" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.9678" x="17500.85" y="1389.6819">Functional API vs Graph API:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="17500.85" y="1404.8147">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.9863" x="17500.85" y="1419.9475">Functional API (@entrypoint + @task):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.5981" x="17509.1146" y="1435.0803">Pythonic; plain functions, no state schema,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.5913" x="17509.1146" y="1450.2131">no explicit nodes or edges. Best for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.0571" x="17509.1146" y="1465.346">linear or simple flows.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="17500.85" y="1480.4788">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.5171" x="17500.85" y="1495.6116">Graph API (StateGraph):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.7192" x="17509.1146" y="1510.7444">Explicit typed State, nodes, edges, reducers.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.9844" x="17509.1146" y="1525.8772">Use when you need conditional routing,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293.2871" x="17509.1146" y="1541.01">parallel branches, subgraphs, or fine-grained</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.5439" x="17509.1146" y="1556.1428">state control.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="17500.85" y="1571.2756">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.29" x="17500.85" y="1586.4085">Both fully support: checkpointing, streaming,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.2974" x="17500.85" y="1601.5413">interrupt(), human-in-the-loop, and BaseStore.</text></g><g class="entity" data-qualified-name="PackageNote" data-source-line="21" id="ent0002"><path d="M12359.63,175.375 L12359.63,715.0234 L12884.38,715.0234 L12884.38,185.375 L12874.38,175.375 L12359.63,175.375" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M12874.38,175.375 L12874.38,185.375 L12884.38,185.375 L12874.38,175.375" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.0708" x="12365.63" y="192.4419">Modern install (v1.0):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.1055" x="12373.8946" y="207.5747">pip install langchain langchain-core</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.439" x="12373.8946" y="222.7075">pip install langchain-openai (or langchain-anthropic, etc.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.415" x="12373.8946" y="237.8403">pip install langgraph</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.5811" x="12373.8946" y="252.9731">pip install langgraph-checkpoint-sqlite   (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.416" x="12373.8946" y="268.106">pip install langgraph-checkpoint-postgres (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="12365.63" y="283.2388">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.1113" x="12365.63" y="298.3716">Key import paths:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.915" x="12373.8946" y="313.5044">Runnable / LCEL primitives   -&gt; langchain_core.runnables</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="421.7573" x="12373.8946" y="328.6372">Base model abstractions      -&gt; langchain_core.language_models</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.7905" x="12373.8946" y="343.77">Messages                     -&gt; langchain_core.messages</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.5562" x="12373.8946" y="358.9028">Document                     -&gt; langchain_core.documents</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.2358" x="12373.8946" y="374.0356">Prompts                      -&gt; langchain_core.prompts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="379.6216" x="12373.8946" y="389.1685">Output parsers               -&gt; langchain_core.output_parsers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.4448" x="12373.8946" y="404.3013">Tools + @tool decorator      -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.3047" x="12373.8946" y="419.4341">Injected tool args           -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="361.3784" x="12373.8946" y="434.5669">Embeddings                   -&gt; langchain_core.embeddings</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.2695" x="12373.8946" y="449.6997">Retrieval                    -&gt; langchain_core.retrievers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="351.2031" x="12373.8946" y="464.8325">Chat history                 -&gt; langchain_core.chat_history</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.6504" x="12373.8946" y="479.9653">Callbacks                    -&gt; langchain_core.callbacks</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.1255" x="12373.8946" y="495.0981">Agents (high-level)          -&gt; langchain.agents [create_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="387.5562" x="12373.8946" y="510.231">Middleware classes            -&gt; langchain.agents.middleware</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="408.9604" x="12373.8946" y="525.3638">Middleware hook decorators   -&gt; langchain.agents.middleware</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="386.2993" x="12373.8946" y="540.4966">Graph API (low-level)        -&gt; langgraph.graph [StateGraph]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="477.6294" x="12373.8946" y="555.6294">Prebuilt nodes               -&gt; langgraph.prebuilt [ToolNode, tools_condition]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="415.873" x="12373.8946" y="570.7622">Functional API               -&gt; langgraph.func [@entrypoint, @task]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="433.9766" x="12373.8946" y="585.895">Prebuilt agent               -&gt; langgraph.prebuilt [create_react_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="491.1563" x="12373.8946" y="601.0278">Graph types/primitives       -&gt; langgraph.types [Command, Send, interrupt]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.416" x="12373.8946" y="616.1606">Runtime context              -&gt; langgraph.runtime [Runtime]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="452.1309" x="12373.8946" y="631.2935">Managed state values         -&gt; langgraph.managed [RemainingSteps]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="495.4854" x="12373.8946" y="646.4263">Checkpointers                -&gt; langgraph.checkpoint.memory [InMemorySaver]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.6592" x="12506.129" y="661.5591">langgraph-checkpoint-sqlite (sep. pkg)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.7588" x="12506.129" y="676.6919">langgraph-checkpoint-postgres (sep. pkg)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="461.6396" x="12373.8946" y="691.8247">Node cache                   -&gt; langgraph.cache.memory [InMemoryCache]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="413.4419" x="12373.8946" y="706.9575">Errors                       -&gt; langgraph.errors [GraphRecursionError]</text></g><g class="entity" data-qualified-name="GMN25" data-source-line="170" id="ent0026"><path d="M27363.29,994.625 L27363.29,1050.0234 L27592.7153,1050.0234 L27592.7153,1004.625 L27582.7153,994.625 L27363.29,994.625" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M27582.7153,994.625 L27582.7153,1004.625 L27592.7153,1004.625 L27582.7153,994.625" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.3267" x="27369.29" y="1011.6919">Built with the pipe operator:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.0098" x="27377.5546" y="1026.8247">prompt | model | parser</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.4253" x="27369.29" y="1041.9575">Every step must be a Runnable.</text></g><!--class BaseCheckpointer--><g class="entity" data-qualified-name="BaseCheckpointer" data-source-line="1643" id="ent0314"><rect fill="#F1F1F1" height="48" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="159.2305" x="14055.38" y="998.315"/><ellipse cx="14070.38" cy="1014.315" fill="#ADD1B2" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M14073.3488,1019.9556 Q14072.7706,1020.2525 14072.13,1020.3931 Q14071.4894,1020.5494 14070.7863,1020.5