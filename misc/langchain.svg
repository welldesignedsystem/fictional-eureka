1264.79,1702.995 L11264.79,1894.5888 L11635.2094,1894.5888 L11635.2094,1712.995 L11625.2094,1702.995 L11264.79,1702.995" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M11625.2094,1702.995 L11625.2094,1712.995 L11635.2094,1712.995 L11625.2094,1702.995" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.5127" x="11270.79" y="1720.0619">Agent jump system - short-circuit the loop:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.5449" x="11270.79" y="1735.1947">Any node-style hook can return "jump_to" to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.2842" x="11270.79" y="1750.3275">redirect execution:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.6665" x="11279.0546" y="1765.4603">return {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.3408" x="11287.3193" y="1780.5931">"messages": [...],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.2368" x="11287.3193" y="1795.726">"jump_to": "end"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="11279.0546" y="1810.8588">}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.3755" x="11270.79" y="1825.9916">Valid targets:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.3076" x="11279.0546" y="1841.1244">"end"   -&gt; skip to after_agent (or END node)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189.2427" x="11279.0546" y="1856.2572">"tools" -&gt; jump to tools node</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.4224" x="11279.0546" y="1871.39">"model" -&gt; jump to model node</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="349.4194" x="11270.79" y="1886.5228">The hook MUST declare can_jump_to via hook_config.</text></g><!--class AgentMiddleware--><g class="entity" data-qualified-name="langchain 1.0 - Agent Middleware.AgentMiddleware" data-source-line="1303" id="ent0262"><rect fill="#F0FFF0" height="162.0781" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="562.1768" x="8625.91" y="941.285"/><ellipse cx="8841.7069" cy="957.285" fill="#A9DCDF" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M8841.8163,952.6288 L8840.66,957.7069 L8842.9881,957.7069 L8841.8163,952.6288 Z M8840.3319,950.3944 L8843.3163,950.3944 L8846.6756,962.785 L8844.2225,962.785 L8843.4569,959.7225 L8840.1756,959.7225 L8839.4256,962.785 L8836.9881,962.785 L8840.3319,950.3944 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="122.083" x="8862.2069" y="962.1317">AgentMiddleware</text><line style="stroke:#181818;stroke-width:0.5;" x1="8626.91" x2="9187.0868" y1="973.285" y2="973.285"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="8636.91" cy="986.9334" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.6631" x="8645.91" y="990.2801">state_schema: Type</text><line style="stroke:#181818;stroke-width:0.5;" x1="8626.91" x2="9187.0868" y1="997.5819" y2="997.5819"/><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="8636.91" cy="1011.2303" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="394.29" x="8645.91" y="1014.577">befor