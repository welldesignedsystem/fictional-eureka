g" textLength="4.1323" x="18108.47" y="1079.1294">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="147.3862" x="18108.47" y="1094.2622">agent = create_agent(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.6831" x="18116.7346" y="1109.395">model="anthropic:claude-sonnet-4-5-20250929",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="100.0264" x="18116.7346" y="1124.5278">tools=[search],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.9229" x="18116.7346" y="1139.6606">checkpointer=InMemorySaver(),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="92.2949" x="18116.7346" y="1154.7935">middleware=[</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.3882" x="18124.9993" y="1169.9263">SummarizationMiddleware(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.7969" x="18133.2639" y="1185.0591">model="gpt-4o-mini",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.9658" x="18133.2639" y="1200.1919">trigger=("tokens", 4000),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.979" x="18133.2639" y="1215.3247">keep=("messages", 20)),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.4922" x="18124.9993" y="1230.4575">HumanInTheLoopMiddleware(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.4365" x="18133.2639" y="1245.5903">interrupt_on={"send_email": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.0044" x="18141.5286" y="1260.7231">"allowed_decisions": ["approve","edit","reject"]}}),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="9.2041" x="18116.7346" y="1275.856">],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="18108.47" y="1290.9888">)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.8247" x="18108.47" y="1306.1216">result = agent.invoke({"messages": [...]})</text></g><g class="entity" data-qualified-name="GMN368" data-source-line="1964" id="ent0369"><path d="M28044.1,1545.9869 L28044.1,1737.5806 L28359.9042,1737.5806 L28359.9042,1555.9869 L28349.9042,1545.9869 L28044.1,1545.9869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M28349.9042,1545.9869 L28349.9042,1555.9869 L28359.9042,1555.9869 L28349.9042,1545.9869" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.7236" x="28050.1" y="1563.0538">Node function signatures (all optional args):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="89.3306" x="28058.3646" y="1578.1866">def my_node(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79.9868" x="28066.6293" y="1593.3194">state: State,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.7144" x="28066.6293" y="1608.4522">config: RunnableConfig,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.7314" x="28066.6293" y="1623.585">runtime: Runtime[Ctx],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="25.981" x="28058.3646" y="1638.7178">): ...</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.7227" x="28050.1" y="1653.8506">Subgraph as a node:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.5396" x="28058.3646" y="1668.9835">graph.add_node("sub", compiled_subgraph)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.0439" x="28050.1" y="1684.1163">Node caching:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0825" x="28058.3646" y="1699.2491">graph.add_node("n", fn,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.9028" x="28066.6293" y="1714.3819">cache_policy=CachePolicy(ttl=60))</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.4741" x="28058.3646" y="1729.5147">graph.compile(cache=InMemoryCache())</text></g><g class="entity" data-qualified-name="GMN371" data-source-line="1979" id="ent0372"><path d="M17117.51,1092.3269 L17117.51,1168.9869 L17082.98,1172.9869 L17117.51,1176.9869 L17117.51,1253.655 A0,0 0 0 0 17117.51,1253.655 L17408.4885,1253.655 A0,0 0 0 0 17408.4885,1253.655 L17408.4885,1102.3269 L17398.4885,1092.3269 L17117.51,1092.3269 A0,0 0 0 0 17117.51,1092.3269" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M17398.4885,1092.3269 L17398.4885,1102.3269 L17408.4885,1102.3269 L17398.4885,1092.3269" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.3623" x="17123.51" y="1109.3938">Thread-level per-conversation memory.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.1157" x="17123.51" y="1124.5266">thread_id required in configurable dict.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.105" x="17123.51" y="1139.6594">For time-travel also pass checkpoint_id:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.2061" x="17131.7746" y="1154.7922">{"configurable": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.0947" x="17140.0393" y="1169.925">"thread_id": "1",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.729" x="17140.0393" y="1185.0578">"checkpoint_id": "abc123"}}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.9785" x="17123.51" y="1200.1906">InMemorySaver is the correct v1.0 name.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.3198" x="17123.51" y="1215.3235">(MemorySaver was the old name.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.1152" x="17123.51" y="1230.4563">SqliteSaver and PostgresSaver live in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.6748" x="17123.51" y="1245.5891">SEPARATE pip packages.</text></g><!--reverse link Runnable to RunnableSerializable--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="extension" data-source-line="106" id="lnk7"><path codeLine="106" d="M2909.3614,744.289 C2913.2114,874.639 2918.39,1049.8969 2920.83,1132.3669" fill="none" id="Runnable-backto-RunnableSerializable" style="stroke:#2196F3;stroke-width:1;"/><polygon fill="none" points="2908.83,726.2969,2903.364,744.4662,2915.3588,744.1119,2908.83,726.2969" style="stroke:#2196F3;stroke-width:1;"/></g><!--reverse link Runnable to RunnableSequence--><g class="link" data-entity-1="ent0004" data-entity-2="ent0009" data-link-type="extension" data-source-line="169" id="lnk17"><path codeLine="169" d="M2788.0978,601.5668 C2429.5478,617.5168 1