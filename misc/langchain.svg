 L18489.533,1179.8125 L18489.533,907.4219 L18479.533,897.4219 L18102.47,897.4219" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M18479.533,897.4219 L18479.533,907.4219 L18489.533,907.4219 L18479.533,897.4219" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="310.1401" x="18108.47" y="914.4888">PRIMARY high-level agent API in LangChain 1.0.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="365.9995" x="18108.47" y="929.6216">Thin wrapper around create_react_agent() (LangGraph).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="18108.47" y="944.7544">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="147.3862" x="18108.47" y="959.8872">agent = create_agent(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.6831" x="18116.7346" y="975.02">model="anthropic:claude-sonnet-4-5-20250929",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="100.0264" x="18116.7346" y="990.1528">tools=[search],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.9229" x="18116.7346" y="1005.2856">checkpointer=InMemorySaver(),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="92.2949" x="18116.7346" y="1020.4185">middleware=[</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.3882" x="18124.9993" y="1035.5513">SummarizationMiddleware(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.7969" x="18133.2639" y="1050.6841">model="gpt-4o-mini",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.9658" x="18133.2639" y="1065.8169">trigger=("tokens", 4000),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.979" x="18133.2639" y="1080.9497">keep=("messages", 20)),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.4922" x="18124.9993" y="1096.0825">HumanInTheLoopMiddleware(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.4365" x="18133.2639" y="1111.2153">interrupt_on={"send_email": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.0044" x="18141.5286" y="1126.3481">"allowed_decisions": ["approve","edit","reject"]}}),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="9.2041" x="18116.7346" y="1141.481">],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="18108.47" y="1156.6138">)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.8247" x="18108.47" y="1171.7466">result = agent.invoke({"messages": [...]})</text></g><g class="entity" data-qualified-name="GMN368" data-source-line="1956" id="ent0369"><path d="M28044.1,1411.6119 L28044.1,1603.2056 L28359.9042,1603.2056 L28359.9042,1421.6119 L28349.9042,1411.6119 L28044.1,1411.6119" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M28349.9042,1411.6119 L28349.9042,1421.6119 L28359.9042,1421.6119 L28349.9042,1411.6119" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.7236" x="28050.1" y="1428.6788">Node function signatures (all optional args):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="89.3306" x="28058.3646" y="1443.8116">def my_node(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79.9868" x="28066.6293" y="1458.9444">state: State,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.7144" x="28066.6293" y="1474.0772">config: RunnableConfig,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.7314" x="28066.6293" y="1489.21">runtime: Runtime[Ctx],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="25.981" x="28058.3646" y="1504.3428">): ...</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.7227" x="28050.1" y="1519.4756">Subgraph as a node:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.5396" x="28058.3646" y="1534.6085">graph.add_node("sub", compiled_subgraph)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.0439" x="28050.1" y="1549.7413">Node caching:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0825" x="28058.3646" y="1564.8741">graph.add_node("n", fn,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.9028" x="28066.6293" y="1580.0069">cache_policy=CachePolicy(ttl=60))</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.4741" x="28058.3646" y="1595.1397">graph.compile(cache=InMemoryCache())</text></g><g class="entity" data-qualified-name="GMN371" data-source-line="1971" id="ent0372"><path d="M17117.51,957.9519 L17117.51,1034.6119 L17082.98,1038.6119 L17117.51,1042.6119 L17117.51,1119.28 A0,0 0 0 0 17117.51,1119.28 L17408.4885,1119.28 A0,0 0 0 0 17408.4885,1119.28 L17408.4885,967.9519 L17398.4885,957.9519 L17117.51,957.9519 A0,0 0 0 0 17117.51,957.9519" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M17398.4885,957.9519 L17398.4885,967.9519 L17408.4885,967.9519 L17398.4885,957.9519" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.3623" x="17123.51" y="975.0188">Thread-level per-conversation memory.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.1157" x="17123.51" y="990.1516">thread_id required in configurable dict.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.105" x="17123.51" y="1005.2844">For time-travel also pass checkpoint_id:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.2061" x="17131.7746" y="1020.4172">{"configurable": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.0947" x="17140.0393" y="1035.55">"thread_id": "1",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.729" x="17140.0393" y="1050.6828">"checkpoint_id": "abc123"}}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.9785" x="17123.51" y="1065.8156">InMemorySaver is the correct v1.0 name.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.3198" x="17123.51" y="1080.9485">(MemorySaver was the old name.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.1152" x="17123.51" y="1096.0813">SqliteSaver and PostgresSaver live in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.6748" x="17123.51" y="1111.2141">SEPARATE pip packages.</text></g><!--reverse link Runnable to Run