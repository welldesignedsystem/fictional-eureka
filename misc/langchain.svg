thAdjust="spacing" textLength="310.1401" x="14722.47" y="898.1919">PRIMARY high-level agent API in LangChain 1.0.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="365.9995" x="14722.47" y="913.3247">Thin wrapper around create_react_agent() (LangGraph).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="14722.47" y="928.4575">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="147.3862" x="14722.47" y="943.5903">agent = create_agent(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.6831" x="14730.7346" y="958.7231">model="anthropic:claude-sonnet-4-5-20250929",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="100.0264" x="14730.7346" y="973.856">tools=[search],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.9229" x="14730.7346" y="988.9888">checkpointer=InMemorySaver(),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="92.2949" x="14730.7346" y="1004.1216">middleware=[</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.3882" x="14738.9993" y="1019.2544">SummarizationMiddleware(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.7969" x="14747.2639" y="1034.3872">model="gpt-4o-mini",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.9658" x="14747.2639" y="1049.52">trigger=("tokens", 4000),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.979" x="14747.2639" y="1064.6528">keep=("messages", 20)),</text><text fill="#000000" font-family="sans-serif" font-size="13" len