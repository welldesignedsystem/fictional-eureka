;" width="253.459" x="13767.27" y="1587.1869"/><ellipse cx="13815.935" cy="1603.1869" fill="#7B2FBE" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M13820.1694,1598.9525 L13814.8882,1598.9525 L13814.8882,1601.6244 L13819.685,1601.6244 L13819.685,1603.7806 L13814.8882,1603.7806 L13814.8882,1609.1869 L13812.4507,1609.1869 L13812.4507,1596.7963 L13820.1694,1596.7963 L13820.1694,1598.9525 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.6289" x="13836.435" y="1608.0336">entrypoint_decorator</text><line style="stroke:#181818;stroke-width:0.5;" x1="13768.27" x2="14019.729" y1="1619.1869" y2="1619.1869"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="13778.27" cy="1632.8353" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.459" x="13787.27" y="1636.182">checkpointer: BaseCheckpointer</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="13778.27" cy="1649.1322" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="116.2861" x="13787.27" y="1652.4789">store: BaseStore</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.0977" x="13773.27" y="1689.0726">CompiledEntrypoint</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="13768.27" x2="13868.6723" y1="1667.9291" y2="1667.9291"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="13868.6723" y="1672.2757">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="13919.3266" x2="14019.729" y1="1667.9291" y2="1667.9291"/></g><!--class task_decorator--><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.task_decorator" data-source-line="2012" id="ent0376"><rect fill="#F5F0FF" height="76.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="136.3779" x="14055.81" y="1603.4869"/><ellipse cx="14070.81" cy="1619.4869" fill="#7B2FBE" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M14075.0444,1615.2525 L14069.7631,1615.2525 L14069.7631,1617.9244 L14074.56,1617.9244 L14074.56,1620.0806 L14069.7631,1620.0806 L14069.7631,1625.4869 L14067.3256,1625.4869 L14067.3256,1613.0963 L14075.0444,1613.0963 L14075.0444,1615.2525 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.3779" x="14084.81" y="1624.3336">task_decorator</text><line style="stroke:#181818;stroke-width:0.5;" x1="14056.81" x2="14191.1879" y1="1635.4869" y2="1635.4869"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="32.5322" x="14061.81" y="1672.7789">Task</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="14056.81" x2="14098.6718" y1="1651.6353" y2="1651.6353"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="14098.6718" y="1655.982">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="14149.3261" x2="14191.1879" y1="1651.6353" y2="1651.6353"/></g><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.FuncAPINote" data-source-line="2027" id="ent0377"><path d="M14226.85,1523.2869 L14226.85,1760.2791 L14551.1474,1760.2791 L14551.1474,1533.2869 L14541.1474,1523.2869 L14226.85,1523.2869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M14541.1474,1523.2869 L14541.1474,1533.2869 L14551.1474,1533.2869 L14541.1474,1523.2869" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.9678" x="14232.85" y="1540.3538">Functional API vs Graph API:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="14232.85" y="1555.4866">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.9863" x="14232.85" y="1570.6194">Functional API (@entrypoint + @task):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.5981" x="14241.1146" y="1585.7522">Pythonic; plain functions, no state schema,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.5913" x="14241.1146" y="1600.885">no explicit nodes or edges. Best for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.0571" x="14241.1146" y="1616.0178">linear or simple flows.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="14232.85" y="1631.1506">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.5171" x="14232.85" y="1646.2835">Graph API (StateGraph):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.7192" x="14241.1146" y="1661.4163">Explicit typed State, nodes, edges, reducers.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.9844" x="14241.1146" y="1676.5491">Use when you need conditional routing,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293.2871" x="14241.1146" y="1691.6819">parallel branches, subgraphs, or fine-grained</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.5439" x="14241.1146" y="1706.8147">state control.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="14232.85" y="1721.9475">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.29" x="14232.85" y="1737.0803">Both fully support: checkpointing, streaming,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.2974" x="14232.85" y="1752.2131">interrupt(), human-in-the-loop, and BaseStore.</text></g><g class="entity" data-qualified-name="PackageNote" data-source-line="30" id="ent0002"><path d="M12470.63,326.0469 L12470.63,865.6953 L12995.38,865.6953 L12995.38,336.0469 L12985.38,326.0469 L12470.63,326.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M12985.38,326.0469 L12985.38,336.0469 L12995.38,336.0469 L12985.38,326.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.0708" x="12476.63" y="343.1138">Modern install (v1.0):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.1055" x="12484.8946" y="358.2466">pip install langchain langchain-core</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.439" x="12484.8946" y="373.3794">pip install langchain-openai (or langchain-anthropic, etc.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.415" x="12484.8946" y="388.5122">pip install langgraph</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.5811" x="12484.8946" y="403.645">pip install langgraph-checkpoint-sqlite   (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.416" x="12484.8946" y="418.7778">pip install langgraph-checkpoint-postgres (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="12476.63" y="433.9106">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.1113" x="12476.63" y="449.0435">Key import paths:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.915" x="12484.8946" y="464.1763">Runnable / LCEL primitives   -&gt; langchain_core.runnables</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="421.7573" x="12484.8946" y="479.3091">Base model abstractions      -&gt; langchain_core.language_models</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.7905" x="12484.8946" y="494.4419">Messages                     -&gt; langchain_core.messages</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.5562" x="12484.8946" y="509.5747">Document                     -&gt; langchain_core.documents</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.2358" x="12484.8946" y="524.7075">Prompts                      -&gt; langchain_core.prompts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="379.6216" x="12484.8946" y="539.8403">Output parsers               -&gt; langchain_core.output_parsers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.4448" x="12484.8946" y="554.9731">Tools + @tool decorator      -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.3047" x="12484.8946" y="570.106">Injected tool args           -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="361.3784" x="12484.8946" y="585.2388">Embeddings                   -&gt; langchain_core.embeddings</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.2695" x="12484.8946" y="600.3716">Retrieval                    -&gt; langchain_core.retrievers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="351.2031" x="12484.8946" y="615.5044">Chat history                 -&gt; langchain_core.chat_history</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.6504" x="12484.8946" y="630.6372">Callbacks                    -&gt; langchain_core.callbacks</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.1255" x="12484.8946" y="645.77">Agents (high-level)          -&gt; langchain.agents [create_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="387.5562" x="12484.8946" y="660.9028">Middleware classes            -&gt; langchain.agents.middleware</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="408.9604" x="12484.8946" y="676.0356">Middleware hook decorators   -&gt; langchain.agents.middleware</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="386.2993" x="12484.8946" y="691.1685">Graph API (low-level)        -&gt; langgraph.graph [StateGraph]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="477.6294" x="12484.8946" y="706.3013">Prebuilt nodes               -&gt; langgraph.prebuilt [ToolNode, tools_condition]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="415.873" x="12484.8946" y="721.4341">Functional API               -&gt; langgraph.func [@entrypoint, @task]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="433.9766" x="12484.8946" y="736.5669">Prebuilt agent               -&gt; langgraph.prebuilt [create_react_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="491.1563" x="12484.8946" y="751.6997">Graph types/primitives       -&gt; langgraph.types [Command, Send, interrupt]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.416" x="12484.8946" y="766.8325">Runtime context              -&gt; langgraph.runtime [Runtime]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="452.1309" x="12484.8946" y="781.9653">Managed state values         -&gt; langgraph.managed [RemainingSteps]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="495.4854" x="12484.8946" y="797.0981">Checkpointers                -&gt; langgraph.checkpoint.memory [InMemorySaver]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.6592" x="12617.129" y="812.231">langgraph-checkpoint-sqlite (sep. pkg)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.7588" x="12617.129" y="827.3638">langgraph-checkpoint-postgres (sep. pkg)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="461.6396" x="12484.8946" y="842.4966">Node cache                   -&gt; langgraph.cache.memory [InMemoryCache]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="413.4419" x="12484.8946" y="857.6294">Errors                       -&gt; langgraph.errors [GraphRecursionError]</text></g><g class="entity" data-qualified-name="GMN25" data-source-line="179" id="ent0026"><path d="M28047.29,1145.2969 L28047.29,1200.6953 L28276.7153,1200.6953 L28276.7153,1155.2969 L28266.7153,1145.2969 L28047.29,1145.2969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M28266.7153,1145.2969 L28266.7153,1155.296