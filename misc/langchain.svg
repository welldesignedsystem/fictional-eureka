hAdjust="spacing" textLength="255.7407" x="25435.1846" y="1056.4266">Text-structure (recommended default):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.0137" x="25443.4493" y="1071.5594">RecursiveCharacterTextSplitter</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.6445" x="25451.7139" y="1086.6922">-&gt; use from_language() for source code</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.6724" x="25464.1109" y="1101.825">(Python, JS, TS, Markdown, HTML, Go ...)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.3804" x="25435.1846" y="1116.9578">Length-based:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.8975" x="25443.4493" y="1132.0906">CharacterTextSplitter  (single separator)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="203.6455" x="25443.4493" y="1147.2235">TokenTextSplitter      (tiktoken)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.542" x="25443.4493" y="1162.3563">SentenceTransformersTokenTextSplitter</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129.8921" x="25435.1846" y="1177.4891">Sentence-level NLP:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.1821" x="25443.4493" y="1192.6219">SpacyTextSplitter  (spaCy pipeline)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.8892" x="25443.4493" y="1207.7547">NLTKTextSplitter   (NLTK punkt)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.4604" x="25435.1846" y="1222.8875">Document-structure (standalone, NOT a TextSplitter):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="356.2178" x="25443.4493" y="1238.0203">MarkdownHeaderTextSplitter  (# / ## / ### headers)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="357.8999" x="25443.4493" y="1253.1531">HTMLHeaderTextSplitter      (h1..h4 tags + I/O helpers)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.0283" x="25443.4493" y="1268.286">RecursiveJsonSplitter       (dict/list input, not str)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="355.6147" x="25426.92" y="1283.4188">Chain structure-based + length-based for best results:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="387.0991" x="25435.1846" y="1298.5516">html_chunks = HTMLHeaderTextSplitter(...).split_text(html)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="488.8965" x="25435.1846" y="1313.6844">final = RecursiveCharacterTextSplitter(500).split_documents(html_chunks)</text></g><!--class BaseCallbackHandler--><g class="entity" data-qualified-name="langchain-core - Callbacks.BaseCallbackHandler" data-source-line="1138" id="ent0226"><rect fill="#E8F4FD" height="210.9688" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="180.6201" x="28255.69" y="1067.5069"/><ellipse cx="28270.69" cy="1083.5069" fill="#A9DCDF" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M28270.7994,1078.8506 L28269.6431,1083.9288 L28271.9713,1083.9288 L28270.7994,1078.8506 Z M28269.315,1076.6163 L28272.2994,1076.6163 L28275.6588,1089.0069 L28273.2056,1089.0069 L28272.44,1085.9444 L28269.1588,1085.9444 L28268.4088,1089.0069 L28265.9713,1089.0069 L28269.315,1076.6163 Z " fill="#000000"/><text fill="#000000" font-family="sans-