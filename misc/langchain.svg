ing" textLength="92.2949" x="14050.7346" y="1004.1216">middleware=[</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.3882" x="14058.9993" y="1019.2544">SummarizationMiddleware(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.7969" x="14067.2639" y="1034.3872">model="gpt-4o-mini",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.9658" x="14067.2639" y="1049.52">trigger=("tokens", 4000),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.979" x="14067.2639" y="1064.6528">keep=("messages", 20)),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.4922" x="14058.9993" y="1079.7856">HumanInTheLoopMiddleware(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.4365" x="14067.2639" y="1094.9185">interrupt_on={"send_email": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.0044" x="14075.5286" y="1110.0513">"allowed_decisions": ["approve","edit","reject"]}}),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="9.2041" x="14050.7346" y="1125.1841">],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="14042.47" y="1140.3169">)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.8247" x="14042.47" y="1155.4497">result = agent.invoke({"messages": [...]})</text></g><g class="entity" data-qualified-name="GMN303" data-source-line="1526" id="ent0304"><path d="M20310.1,1395.315 L20310.1,1586.9088 L20625.9042,1586.9088 L20625.9042,1405.315 L20615.9042,1395.315 L20310.1,1395.315" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M20615.9042,1395.315 L20615.9042,1405.315 L20625.9042,1405.315 L20615.9042,1395.315" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.7236" x="20316.1" y="1412.3819">Node function signatures (all optional args):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="89.3306" x="20324.3646" y="1427.5147">def my_node(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79.9868" x="20332.6293" y="1442.6475">state: State,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.7144" x="20332.6293" y="1457.7803">config: RunnableConfig,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.7314" x="20332.6293" y="1472.9131">runtime: Runtime[Ctx],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="25.981" x="20324.3646" y="1488.046">): ...</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.7227" x="20316.1" y="1503.1788">Subgraph as a node:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.5396" x="20324.3646" y="1518.3116">graph.add_node("sub", compiled_subgraph)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.0439" x="20316.1" y="1533.4444">Node caching:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0825" x="20324.3646" y="1548.5772">graph.add_node("n", fn,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.9028" x="20332.6293" y="1563.71">cache_policy=CachePolicy(ttl=60))</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.4741" x="20324.3646" y="1578.8428">graph.compile(cache=InMemoryCache())</text></g><g class="entity" data-qualified-name="GMN306" data-source-line="1541" id="ent0307"><path d="M13568.51,941.655 L13568.51,1018.315 L13533.98,1022.315 L13568.51,1026.315 L13568.51,1102.9831 A0,0 0 0 0 13568.51,1102.9831 L13859.4885,1102.9831 A0,0 0 0 0 13859.4885,1102.9831 L13859.4885,951.655 L13849.4885,941.655 L13568.51,941.655 A0,0 0 0 0 13568.51,941.655" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M13849.4885,941.655 L13849.4885,951.655 L13859.4885,951.655 L13849.4885,941.655" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.3623" x="13574.51" y="958.7219">Thread-level per-conversation memory.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.1157" x="13574.51" y="973.8547">thread_id required in configurable dict.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.105" x="13574.51" y="988.9875">For time-travel also pass checkpoint_id:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.2061" x="13582.7746" y="1004.1203">{"configurable": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.0947" x="13591.0393" y="1019.2531">"thread_id": "1",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.729" x="13591.0393" y="1034.386">"checkpoint_id": "abc123"}}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.9785" x="13574.51" y="1049.5188">InMemorySaver is the correct v1.0 name.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.3198" x="13574.51" y="1064.6516">(MemorySaver was the old name.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.1152" x="13574.51" y="1079.7844">SqliteSaver and PostgresSaver live in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.6748" x="13574.51" y="1094.9172">SEPARATE pip packages.</text></g><!--reverse link Runnable to RunnableSerializable--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="extension" data-source-line="97" id="lnk7"><path codeLine="97" d="M2910.3614,593.6172 C2914.2114,723.9672 2919.39,899.225 2921.83,981.695" fill="none" id="Runnable-backto-RunnableSerializable" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="2909.83,575.625,2904.364,593.7943,2916.3588,593.44,2909.83,575.625" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Runnable to RunnableSequence--><g class="link" data-entity-1="ent0004" data-entity-2="ent0009" data-link-type="extension" data-source-line="160" id="lnk17"><path codeLine="160" d="M2789.0348,455.5915 C2474.3848,482.3715 1522.11,577.635 1283,770.025 C1225.21,816.525 1197.02,899.465 1183.81,957.285" fill="none" id="Runnable-backto-RunnableSequence" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="2806.97,454.065,2788.526,449.6131,2789.5437,461.5699,2806.97,454.065" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link Runnable to RunnableParallel--><g class="link" data-entity-1="ent0004" data-entity-2="ent0010" data-link-type="extension" data-source-line="161" id="lnk18"><path codeLine="161" d="M2789.0131,460.4506 C2506.8431,496.2506 1724.54,607.835 1523,770.025 C1458.69,821.785 1426.78,916.295 1412.66,973.495" fill="none" id="Runnable-backto-RunnableParallel" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="2806.87,458.185,2788.258,454.4983,2789.7683,466.4029,2806.87,458.185" style="stroke:#181818;stroke-width:1;"/>