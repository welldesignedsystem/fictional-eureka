st="spacing" textLength="146.1455" x="7546.36" y="1729.817">CompiledStateGraph</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="7541.36" x2="7654.672" y1="1708.6734" y2="1708.6734"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="7654.672" y="1713.0201">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="7705.3263" x2="7818.6383" y1="1708.6734" y2="1708.6734"/></g><!--class entrypoint_decorator--><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.entrypoint_decorator" data-source-line="1996" id="ent0375"><rect fill="#F5F0FF" height="109.1875" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="253.459" x="8497.27" y="1587.1869"/><ellipse cx="8545.935" cy="1603.1869" fill="#7B2FBE" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M8550.1694,1598.9525 L8544.8882,1598.9525 L8544.8882,1601.6244 L8549.685,1601.6244 L8549.685,1603.7806 L8544.8882,1603.7806 L8544.8882,1609.1869 L8542.4507,1609.1869 L8542.4507,1596.7963 L8550.1694,1596.7963 L8550.1694,1598.9525 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.6289" x="8566.435" y="1608.0336">entrypoint_decorator</text><line style="stroke:#181818;stroke-width:0.5;" x1="8498.27" x2="8749.729" y1="1619.1869" y2="1619.1869"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="8508.27" cy="1632.8353" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.459" x="8517.27" y="1636.182">checkpointer: BaseCheckpointer</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="8508.27" cy="1649.1322" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="116.2861" x="8517.27" y="1652.4789">store: BaseStore</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.0977" x="8503.27" y="1689.0726">CompiledEntrypoint</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="8498.27" x2="8598.6723" y1="1667.9291" y2="1667.9291"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="8598.6723" y="1672.2757">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="8649.3266" x2="8749.729" y1="1667.9291" y2="1667.9291"/></g><!--class task_decorator--><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.task_decorator" data-source-line="2012" id="ent0376"><rect fill="#F5F0FF" height="76.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="136.3779" x="9117.81" y="1603.4869"/><ellipse cx="9132.81" cy="1619.4869" fill="#7B2FBE" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M9137.0444,1615.2525 L9131.7631,1615.2525 L9131.7631,1617.9244 L9136.56,1617.9244 L9136.56,1620.0806 L9131.7631,1620.0806 L9131.7631,1625.4869 L9129.3256,1625.4869 L9129.3256,1613.0963 L9137.0444,1613.0963 L9137.0444,1615.2525 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.3779" x="9146.81" y="1624.3336">task_decorator</text><line style="stroke:#181818;stroke-width:0.5;" x1="9118.81" x2="9253.1879" y1="1635.4869" y2="1635.4869"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="32.5322" x="9123.81" y="1672.7789">Task</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="9118.81" x2="9160.6718" y1="1651.6353" y2="1651.6353"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="9160.6718" y="1655.982">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="9211.3261" x2="9253.1879" y1="1651.6353" y2="1651.6353"/></g><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.GMN377" data-source-line="2026" id="ent0378"><path d="M8785.48,1553.5469 L8785.48,1730.0078 L9082.5205,1730.0078 L9082.5205,1563.5469 L9072.5205,1553.5469 L8785.48,1553.5469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M9072.5205,1553.5469 L9072.5205,1563.5469 L9082.5205,1563.5469 L9072.5205,1553.5469" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="98.0396" x="8791.48" y="1570.6138">&#9889; LPU vs GPU</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="219.9907" x="8791.48" y="1585.7466">Groq uses a Language Processing</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.6826" x="8791.48" y="1600.8794">Unit (LPU), not a GPU.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="8791.48" y="1616.0122">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="112.3154" x="8791.48" y="1631.145">Why it's faster:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232.5781" x="8791.48" y="1646.2778">&#8226; Purpose-built for sequential token</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="267.7759" x="8799.7446" y="1661.4106">generation, not general parallel compute</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.3135" x="8791.48" y="1676.5435">&#8226; Zero memory bandwidth bottleneck &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.3262" x="8799.7446" y="1691.6763">weights stay on-chip at all times</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="221.6982" x="8791.48" y="1706.8091">&#8226; Deterministic latency per token,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.2852" x="8799.7446" y="1721.9419">unlike GPU scheduling</text></g><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.FuncAPINote" data-source-line="2040" id="ent0380"><path d="M9288.85,1523.2869 L9288.85,1760.2791 L9613.1474,1760.2791 L9613.1474,1533.2869 L9603.1474,1523.2869 L9288.85,1523.2869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M9603.1474,1523.2869 L9603.1474,1533.2869 L9613.1474,1533.2869 L9603.1474,1523.2869" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.9678" x="9294.85" y="1540.3538">Functional API vs Graph API:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="9294.85" y="1555.4866">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.9863" x="9294.85" y="1570.6194">Functional API (@entrypoint + @task):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.5981" x="9303.1146" y="1585.7522">Pythonic; plain functions, no state schema,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.5913" x="9303.1146" y="1600.885">no explicit nodes or edges. Best for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.0571" x="9303.1146" y="1616.0178">linear or simple flows.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="9294.85" y="1631.1506">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.5171" x="9294.85" y="1646.2835">Graph API (StateGraph):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.7192" x="9303.1146" y="1661.4163">Explicit typed State, nodes, edges, reducers.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.9844" x="9303.1146" y="1676.5491">Use when you need conditional routing,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293.2871" x="9303.1146" y="1691.6819">parallel branches, subgraphs, or fine-grained</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.5439" x="9303.1146" y="1706.8147">state control.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="9294.85" y="1721.9475">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.29" x="9294.85" y="1737.0803">Both fully support: checkpointing, streaming,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.2974" x="9294.85" y="1752.2131">interrupt(), human-in-the-loop, and BaseStore.</text></g><g class="entity" data-qualified-name="PackageNote" data-source-line="30" id="ent0002"><path d="M17705.63,326.0469 L17705.63,865.6953 L18230.38,865.6953 L18230.38,336.0469 L18220.38,326.0469 L17705.63,326.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M18220.38,326.0469 L18220.38,336.0469 L18230.38,336.0469 L18220.38,326.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.0708" x="17711.63" y="343.1138">Modern install (v1.0):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.1055" x="17719.8946" y="358.2466">pip install langchain langchain-core</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.439" x="17719.8946" y="373.3794">pip install langchain-openai (or langchain-anthropic, etc.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.415" x="17719.8946" y="388.5122">pip install langgraph</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.5811" x="17719.8946" y="403.645">pip install langgraph-checkpoint-sqlite   (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.416" x="17719.8946" y="418.7778">pip install langgraph-checkpoint-postgres (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="17711.63" y="433.9106">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.1113" x="17711.63" y="449.0435">Key import paths:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.915" x="17719.8946" y="464.1763">Runnable / LCEL primitives   -&gt; langchain_core.runnables</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="421.7573" x="17719.8946" y="479.3091">Base model abstractions      -&gt; langchain_core.language_models</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.7905" x="17719.8946" y="494.4419">Messages                     -&gt; langchain_core.messages</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.5562" x="17719.8946" y="509.5747">Document                     -&gt; langchain_core.documents</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.2358" x="17719.8946" y="524.7075">Prompts                      -&gt; langchain_core.prompts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="379.6216" x="17719.8946" y="539.8403">Output parsers               -&gt; langchain_core.output_parsers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.4448" x="17719.8946" y="554.9731">Tools + @tool decorator      -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.3047" x="17719.8946" y="570.106">Injected tool args           -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="361.3784" x="17719.8946" y="585.2388">Embeddings                   -&gt; langchain_core.embeddings</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.2695" x="17719.8946" y="600.3716">Retrieval                    -&gt; langchain_core.retrievers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="351.2031" x="17719.8946" y="615.5044">Chat history                 -&gt; langchain_core.chat_history</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.6504" x="17719.8946" y="630.6372">Callbacks                    -&gt; langchain_core.callbacks</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.1255" x="17719.8946" y="645.77">Agents (high-level)          -&gt; langchain.agents [create_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="387.5562" x="17719.8946" y="660.9028">Middleware classes            -&gt; langchain.agents.middleware</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="408.9604" x="17719.8946" y="676.0356">Middleware hook decorators   -&gt; langchain.agents.middleware</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="386.2993" x="17719.8946" y="691.1685">Graph API (low-level)        -&gt; langgraph.graph [StateGraph]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="477.6294" x="17719.8946" y="706.3013">Prebuilt nodes               -&gt; langgraph.prebuilt [ToolNode, tools_condition]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="415.873" x="17719.8946" y="721.4341">Functional API               -&gt; langgraph.func [@entrypoint, @task]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="433.9766" x="17719.8946" y="736.5669">Prebuilt agent               -&gt; langgraph.prebuilt [create_react_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="491.1563" x="17719.8946" y="751.6997">Graph types/primitives       -&gt; langgraph.types [Command, Send, interrupt]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.416" x="17719.8946" y="766.8325">Runtime context              -&gt; langgraph.runtime [Runtime]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="452.1309" x="17719.8946" y="781.9653">Managed state values         -&gt; langgraph.managed [RemainingSteps]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="495.4854" x="17719.8946" y="797.0981">Checkpointers                -&gt; langgraph.checkpoint.memory [InMemorySaver]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.6592