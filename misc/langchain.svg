mp system - short-circuit the loop:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.5449" x="11540.79" y="1735.1947">Any node-style hook can return "jump_to" to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.2842" x="11540.79" y="1750.3275">redirect execution:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.6665" x="11549.0546" y="1765.4603">return {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.3408" x="11557.3193" y="1780.5931">"messages": [...],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.2368" x="11557.3193" y="1795.726">"jump_to": "end"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="11549.0546" y="1810.8588">}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.3755" x="11540.79" y="1825.9916">Valid targets:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.3076" x="11549.0546" y="1841.1244">"end"   -&gt; skip to after_agent (or END node)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189.2427" x="11549.0546" y="1856.2572">"tools" -&gt; jump to tools node</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.4224" x="11549.0546" y="1871.39">"model" -&gt; jump to model node</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="349.4194" x="11540.79" y="1886.5228">The hook MUST declare can_jump_to via hook_config.</text></g><!--class AgentMiddleware--><g class="entity" data-qualified-name="langchain 1.0 - Agent Middleware.AgentMiddleware" data-source