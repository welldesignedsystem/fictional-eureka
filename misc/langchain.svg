plitter      (tiktoken)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.542" x="27516.4493" y="1162.3563">SentenceTransformersTokenTextSplitter</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129.8921" x="27508.1846" y="1177.4891">Sentence-level NLP:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.1821" x="27516.4493" y="1192.6219">SpacyTextSplitter  (spaCy pipeline)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.8892" x="27516.4493" y="1207.7547">NLTKTextSplitter   (NLTK punkt)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.4604" x="27508.1846" y="1222.8875">Document-structure (standalone, NOT a TextSplitter):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="356.2178" x="27516.4493" y="1238.0203">MarkdownHeaderTextSplitter  (# / ## / ### headers)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="357.8999" x="27516.4493" y="1253.1531">HTMLHeaderTextSplitter      (h1..h4 tags + I/O helpers)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.0283" x="27516.4493" y="1268.286">RecursiveJsonSplitter       (dict/list input, not str)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="355.6147" x="27499.92" y="1283.4188">Chain structure-based + length-based for best results:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="387.0991" x="27508.1846" y="1298.5516">html_chunks = HTMLHeaderTextSplitter(...).split_text(html)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="488.8965" x="27508.1846" y="1313.6844">final = RecursiveCharacterTextSplitter(500).split_documents(html_chunks)</text></g><!--class BaseCallbackHandler--><g class="entity" data-qualified-name="langchain-core - Callbacks.BaseCallbackHandler" data-source-line="1138" id="ent0226"><rect fill="#E8F4FD" height="210.9688" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="180.6201" x="5892.69" y="1067.5069"/><ellipse cx="5907.69" cy="1083.5069" fill="#A9DCDF" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M5907.7994,1078.8506 L5906.6431,1083.9288 L5908.9713,1083.9288 L5907.7994,1078.8506 Z M5906.315,1076.6163 L5909.2994,1076.6163 L5912.6588,1089.0069 L5910.2056,1089.0069 L5909.44,1085.9444 L5906.1588,1085.9444 L5905.4088,1089.0069 L5902.9713,1089.0069 L5906.315,1076.6163 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="148.6201" x="5921.69" y="1088.3536">BaseCallbackHandler</text><line style="stroke:#181818;stroke-width:0.5;" x1="5893.69" x2="6072.3101" y1="1099.5069" y2="1099.5069"/><line style="stroke:#181818;stroke-width:0.5;" x1="5893.69" x2="6072.3101" y1="1107.5069" y2="1107.5069"/><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="5903.69" cy="1121.1553" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="96.3867" x="5912.69" y="1124.502">on_llm_start()</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="5903.69" cy="1137.4522" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.3643" x="5912.69" y="1140.7989">on_llm_new_token()</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="5903.69" cy="1153.7491" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font