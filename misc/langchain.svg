-size="13" lengthAdjust="spacing" textLength="213.5161" x="9635.5593" y="981.42">if len(state["messages"]) &gt;= 50:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.1743" x="9652.0886" y="996.5528">return {"jump_to": "end"}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="78.311" x="9635.5593" y="1011.6856">return None</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="9619.03" y="1026.8185">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="121.0117" x="9619.03" y="1041.9513">@wrap_model_call</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.5127" x="9619.03" y="1057.0841">def retry(request: ModelRequest, handler):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.3296" x="9635.5593" y="1072.2169">for i in range(3):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.54" x="9652.0886" y="1087.3497">try: return handler(request)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="82.4624" x="9652.0886" y="1102.4825">except: pass</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="9619.03" y="1117.6153">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.6367" x="9619.03" y="1132.7481">@dynamic_prompt</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.2461" x="9619.03" y="1147.881">def add_ctx(state: AgentState, runtime) -&gt; str:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.0195" x="9635.5593" 