 hook_config_decorator--><g class="entity" data-qualified-name="langchain 1.0 - Middleware Support Types.hook_config_decorator" data-source-line="1270" id="ent0256"><rect fill="#FFF0E8" height="64.2969" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="190.8604" x="11584.57" y="1475.2619"/><ellipse cx="11599.57" cy="1491.2619" fill="#FF8800" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M11603.8044,1487.0275 L11598.5231,1487.0275 L11598.5231,1489.6994 L11603.32,1489.6994 L11603.32,1491.8556 L11598.5231,1491.8556 L11598.5231,1497.2619 L11596.0856,1497.2619 L11596.0856,1484.8713 L11603.8044,1484.8713 L11603.8044,1487.0275 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="158.8604" x="11613.57" y="1496.1086">hook_config_decorator</text><line style="stroke:#181818;stroke-width:0.5;" x1="11585.57" x2="11774.4304" y1="1507.2619" y2="1507.2619"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="11595.57" cy="1520.9103" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="151.5938" x="11604.57" y="1524.257">can_jump_to: List[str]</text><line style="stroke:#181818;stroke-width:0.5;" x1="11585.57" x2="11774.4304" y1="1531.5588" y2="1531.5588"/></g><g class="entity" data-qualified-name="langchain 1.0 - Middleware Support Types.JumpNote" data-source-line="1284" id="ent0257"><path d="M11375.79,1719.2919 L11375.79,1910.8856 L11746.2094,1910.8856 L11746.2094,1729.2919 L11736.2094,1719.2919 L11375.79,1719.2919" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M11736.2094,1719.2919 L11736.2094,1729.2919 L11746.2094,1729.2919 L11736.2094,1719.2919" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.5127" x="11381.79" y="1736.3588">Agent jump system - short-circuit the loop:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.5449" x="11381.79" y="1751.4916">Any node-style hook can return "jump_to" to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.2842" x="11381.79" y="1766.6244">redirect execution:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.6665" x="11390.0546" y="1781.7572">return {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.3408" x="11398.3193" y="1796.89">"messages": [...],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.2368" x="11398.3193" y="1812.0228">"jump_to": "end"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="11390.0546" y="1827.1556">}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.3755" x="11381.79" y="1842.2885">Valid targets:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.3076" x="11390.0546" y="1857.4213">"end"   -&gt; skip to after_agent (or END node)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189.2427" x="11390.0546" y="1872.5541">"tools" -&gt; jump to tools node</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.4224" x="11390.0546" y="1887.6869">"model" -&gt; jump to model node</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="349.4194" x="11381.79" y="1902.8197">The hook MUST declare can_jump_to via hook_config.</text></g><!--class AgentMiddleware--><g class="entity" data-qualified-name="langchain 1.0 - Agent Middleware.AgentMiddleware" data-source-line="1309" id="ent0263"><rect fill="#F0FFF0" height="162.0781" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="562.1768" x="8772.91" y="957.5819"/><ellipse cx="8988.7069" cy="973.5819" fill="#A9DCDF" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M8988.8163,968.9256 L8987.66,974.0038 L8989.9881,974.0038 L8988.8163,968.9256 Z M8987.3319,966.6913 L8990.3163,966.6913 L8993.6756,979.0819 L8991.2225,979.0819 L8990.4569,976.0194 L8987.1756,976.0194 L8986.4256,979.0819 L8983.9881,979.0819 L8987.3319,966.6913 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="122.083" x="9009.2069" y="978.4286">AgentMiddleware</text><line style="stroke:#181818;stroke-width:0.5;" x1="8773.91" x2="9334.0868" y1="989.5819" y2="989.5819"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="8783.91" cy="1003.2303" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.6631" x="8792.91" y="1006.577">state_schema: Type</text><line style="stroke:#181818;stroke-width:0.5;" x1="8773.91" x2="9334.0868" y1="1013.8788" y2="1013.8788"/><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="8783.91" cy="1027.5272" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="394.29" x="8792.91" y="1030.8739">before_agent(state: AgentState, runtime: Runtime): dict</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="8783.91" cy="1043.8241" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="397.4414" x="8792.91" y="1047.1707">before_model(state: AgentState, runtime: Runtime): dict</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="8783.91" cy="1060.1209" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="385.4443" x="8792.91" y="1063.4676">after_model(state: AgentState, runtime: Runtime): dict</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="8783.91" cy="1076.4178" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="382.293" x="8792.91" y="1079.7645">after_agent(state: AgentState, runtime: Runtime): dict</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="8783.91" cy="1092.7147" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="536.1768" x="8792.91" y="1096.0614">wrap_model_call(request: ModelRequest, handler: Callable): ModelResponse</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="8783.91" cy="1109.0116" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="513.7959" x="8792.91" y="1112.3582">wrap_tool_call(request: ToolCallRequest, handler: Callable): ToolMessage</text></g><g class="entity" data-qualified-name="langchain 1.0 - Agent Middleware.HookDecoratorsNote" data-source-line="1337" id="ent0264"><path d="M9756.03,829.3219 L9756.03,1247.9078 L10179.9602,1247.9078 L10179.9602,839.3219 L10169.9602,829.3219 L9756.03,829.3219" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M10169.9602,829.3219 L10169.9602,839.3219 L10179.9602,839.3219 L10169.9602,829.3219" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="402.9302" x="9762.03" y="846.3888">DECORATOR-BASED MIDDLEWARE (single-hoo