8;stroke-width:0.5;" x1="10326.93" x2="10503.0755" y1="1965.4669" y2="1965.4669"/></g><g class="entity" data-qualified-name="GMN321" data-source-line="1662" id="ent0322"><path d="M10793.47,1031.7969 L10793.47,1314.1875 L11180.533,1314.1875 L11180.533,1041.7969 L11170.533,1031.7969 L10793.47,1031.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M11170.533,1031.7969 L11170.533,1041.7969 L11180.533,1041.7969 L11170.533,1031.7969" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="310.1401" x="10799.47" y="1048.8638">PRIMARY high-level agent API in LangChain 1.0.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="365.9995" x="10799.47" y="1063.9966">Thin wrapper around create_react_agent() (LangGraph).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="10799.47" y="1079.1294">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="147.3862" x="10799.47" y="1094.2622">agent = create_agent(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.6831" x="10807.7346" y="1109.395">model="anthropic:claude-sonnet-4-5-20250929",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="100.0264" x="10807.7346" y="1124.5278">tools=[search],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.9229" x="10807.7346" y="1139.6606">checkpointer=InMemorySaver(),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="92.2949" x="10807.7346" y="1154.7935">middleware=[</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.3882" x="10815.9993" y="1169.9263">SummarizationMiddleware(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.7969" x="10824.2639" y="1185.0591">model="gpt-4o-mini",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.9658" x="10824.2639" y="1200.1919">trigger=("tokens", 4000),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.979" x="10824.2639" y="1215.3247">keep=("messages", 20)),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.4922" x="10815.9993" y="1230.4575">HumanInTheLoopMiddleware(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.4365" x="10824.2639" y="1245.5903">interrupt_on={"send_email": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.0044" x="10832.5286" y="1260.7231">"allowed_decisions": ["approve","edit","reject"]}}),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="9.2041" x="10807.7346" y="1275.856">],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="10799.47" y="1290.9888">)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.8247" x="10799.47" y="1306.1216">result = agent.invoke({"messages": [...]})</text></g><g class="entity" data-qualified-name="GMN368" data-source-line="1964" id="ent0369"><path d="M28781.1,1545.9869 L28781.1,1737.5806 L29096.9042,1737.5806 L29096.9042,1555.9869 L29086.9042,1545.9869 L28781.1,1545.9869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M29086.9042,1545.9869 L29086.9042,1555.9869 L29096.9042,1555.9869 L29086.9042,1545.9869" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.7236" x="28787.1" y="1563.0538">Node function signatures (all optional args):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="89.3306" x="28795.3646" y="1578.1866">def my_node(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79.9868" x="28803.6293" y="1593.3194">state: State,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.7144" x="28803.6293" y="1608.4522">config: RunnableConfig,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.7314" x="28803.6293" y="1623.585">runtime: Runtime[Ctx],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="25.981" x="28795.3646" y="1638.7178">): ...</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.7227" x="28787.1" y="1653.8506">Subgraph as a node:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.5396" x="28795.3646" y="1668.9835">graph.add_node("sub", compiled_subgraph)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.0439" x="28787.1" y="1684.1163">Node caching:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0825" x="28795.3646" y="1699.2491">graph.add_node("n", fn,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.9028" x="28803.6293" y="1714.3819">cache_policy=CachePolicy(ttl=60))</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.4741" x="28795.3646" y="1729.5147">graph.compile(cache=InMemoryCache())</text></g><g class="entity" data-qualified-name="GMN371" data-source-line="1979" id="ent0372"><path d="M8358.51,1092.3269 L8358.51,1168.9869 L8323.98,1172.9869 L8358.51,1176.9869 L8358.51,1253.655 A0,0 0 0 0 8358.51,1253.655 L8649.4885,1253.655 A0,0 0 0 0 8649.4885,1253.655 L8649.4885,1102.3269 L8639.4885,1092.3269 L8358.51,1092.3269 A0,0 0 0 0 8358.51,1092.3269" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M8639.4885,1092.3269 L8639.4885,1102.3269 L8649.4885,1102.3269 L8639.4885,1092.3269" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.3623" x="8364.51" y="1109.3938">Thread-level per-conversation memory.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.1157" x="8364.51" y="1124.5266">thread_id required in configurable dict.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.105" x="8364.51" y="1139.6594">For time-travel also pass checkpoint_id:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.2061" x="8372.7746" y="1154.7922">{"configurable": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.0947" x="8381.0393" y="1169.925">"thread_id": "1",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.729" x="8381.0393" y="1185.0578">"checkpoint_id": "abc123"}}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.9785" x="8364.51" y="1200.1906">InMemorySaver is the correct v1.0 name.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.3198" x="8364.51" y="1215.3235">(MemorySaver was the old name.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.1152" x="8364.51" y="1230.4563">SqliteSaver and PostgresSaver live in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.6748" x="8364.51" y="1245.5891">SEPARATE pip packages.</text></g><!--reverse link Runnable to RunnableSerializable--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="extension" data-source-line="106" id="lnk7"><path codeLine="106" d="M7681.3614,744.289 C7685.2114,874.639 7690.39,1049.8969 7692.83,1132.3669" fill="none" id="Runnable-backto-RunnableSerializable" style="stroke:#2196F3;stroke-width:1;"/><polygon fill="none" points="7680.83,726.2969,7675.364,744.4662,7687.3588,744.1119,7680.83,726.2969" style="stroke:#2196F3;stroke-width:1;"/></g><!--reverse link Runnable to RunnableSequence--><g class="link" data-entity-1="ent0004" data-entity-2="ent0009" data-link-type="extension" data-source-line="169" id="lnk17"><path codeLine="169" d="M7559.8549,599.5258 C6947.7449,613.7758 3638.28,697.2769 932,895.6969 C823.28,903.6669 776.08,856.4669 688,920.6969 C627.69,964.6869 599.99,1049.0169 587.58,1107.7969" fill="none" id="Runnable-backto-RunnableSequence" style="stroke:#2196F3;stroke-width:1;"/><polygon fill="none" points="7577.85,599.1069,7559.7152,593.5274,7559.9945,605.5242,7577.85,599.1069" style="stroke:#2196F3;stroke-width:1;"/></g><!--reverse link Runnable to RunnableParallel--><g class="link" data-entity-1="ent0004" data-entity-2="ent0010" data-link-type="extension" data-source-line="170" id="lnk18"><path codeLine="170" d="M7560.1823,598.6566 C6958.7623,608.3366 3747.11,668.9769 1124,895.6969 C1036.51,903.2569 999.16,869.2369 928,920.6969 C860.71,969.3569 829.7,1065.8369 816.57,1124.0669" fill="none" id="Runnable-backto-RunnableParallel" style="stroke:#2196F3;stroke-width:1;"/><polygon fill="none" points="7578.18,598.3669,7560.0858,592.6573,7560.2789,604.6558,7578.18,598.3669" style="stroke:#2196F3;stroke-width:1;"/></g><!--reverse link Runnable to RunnableLambda--><g class="link" data-entity-1="ent0004" data-e