ig,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.7314" x="21012.6293" y="1472.9131">runtime: Runtime[Ctx],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="25.981" x="21004.3646" y="1488.046">): ...</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.7227" x="20996.1" y="1503.1788">Subgraph as a node:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.5396" x="21004.3646" y="1518.3116">graph.add_node("sub", compiled_subgraph)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.0439" x="20996.1" y="1533.4444">Node caching:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0825" x="21004.3646" y="1548.5772">graph.add_node("n", fn,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.9028" x="21012.6293" y="1563.71">cache_policy=CachePolicy(ttl=60))</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.4741" x="21004.3646" y="1578.8428">graph.compile(cache=InMemoryCache())</text></g><g class="entity" data-qualified-name="GMN312" data-source-line="1563" id="ent0313"><path d="M14248.51,941.655 L14248.51,1018.315 L14213.98,1022.315 L14248.51,1026.315 L14248.51,1102.9831 A0,0 0 0 0 14248.51,1102.9831 L14539.4885,1102.9831 A0,0 0 0 0 14539.4885,1102.9831 L14539.4885,951.655 L14529.4885,941.655 L14248.51,941.655 A0,0 0 0 0 14248.51,941.655" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M14529.4885,941.655 L14529.4885,951.655 L14539.4885,951.655 L14529.4885,941.655" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.3623" x="14254.51" y="958.7219">Thread-level per-conversation memory.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.1157" x="14254.51" y="973.8547">thread_id required in configurable dict.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.105" x="14254.51" y="988.9875">For time-travel also pass checkpoint_id:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.2061" x="14262.7746" y="1004.1203">{"configurable": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.0947" x="14271.0393" y="1019.2531">"thread_id": "1",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.729" x="14271.0393" y="1034.386">"checkpoint_id": "abc123"}}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.9785" x="14254.51" y="1049.5188">InMemorySaver is the correct v1.0 name.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.3198" x="14254.51" y="1064.6516">(MemorySaver was the old name.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.1152" x="14254.51" y="1079.7844">SqliteSaver and PostgresSaver live in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.6748" x="14254.51" y="1094.9172">SEPARATE pip packages.</text></g><!--reverse link Runnable to RunnableSerializable--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="extension" data-source-line="97" id="lnk7"><path codeLine="97" d="M2910.3614,593.6172 C2914.2114,723.9672 2919.39,899.225 2921.83,981.695" fill="none" id="Runnable-backto-RunnableSerializable" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="2