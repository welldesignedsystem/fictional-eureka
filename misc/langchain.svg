6" y="1079.125">PDFs       : PyPDFLoader (default), PyMuPDFLoader</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.9609" x="24286.2649" y="1094.2578">(fast), PDFPlumberLoader (tables),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.71" x="24286.2649" y="1109.3906">PDFMinerLoader, PyPDFDirectoryLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.4028" x="24286.2649" y="1124.5235">PyPDFium2Loader</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.6563" x="24232.5446" y="1139.6563">Web        : WebBaseLoader, RecursiveUrlLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.8872" x="24286.2649" y="1154.7891">SitemapLoader, FirecrawlLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="198.834" x="24286.2649" y="1169.9219">WikipediaLoader, ArxivLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.1948" x="24286.2649" y="1185.0547">YoutubeTranscriptLoader</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="288.2979" x="24232.5446" y="1200.1875">Cloud      : S3FileLoader, S3DirectoryLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129.3906" x="24286.2649" y="1215.3203">GoogleDriveLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.6558" x="24286.2649" y="1230.4531">AzureBlobStorageLoader</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.7642" x="24232.5446" y="1245.586">Productivity: NotionDirectoryLoader,</text><text fill="#000000" font-family=