60.19 Q27196.1894,1460.19 27196.83,1460.3463 Q27197.4863,1460.5025 27198.0488,1460.7994 L27198.0488,1463.5181 Q27197.4238,1462.94 27196.83,1462.6744 Q27196.2363,1462.3931 27195.6113,1462.3931 Q27194.2675,1462.3931 27193.58,1463.4713 Q27192.8925,1464.5338 27192.8925,1466.6275 Q27192.8925,1468.7213 27193.58,1469.7994 Q27194.2675,1470.8619 27195.6113,1470.8619 Q27196.2363,1470.8619 27196.83,1470.5963 Q27197.4238,1470.315 27198.0488,1469.7369 L27198.0488,1472.4556 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="117.8447" x="27209.08" y="1471.6617">NLTKTextSplitter</text><line style="stroke:#181818;stroke-width:0.5;" x1="27181.08" x2="27328.9247" y1="1482.815" y2="1482.815"/><g data-visibility-modifier="PRIVATE_FIELD"><rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="27188.08" y="1493.4634"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="95.2246" x="27200.08" y="1499.8101">separator: str</text><g data-visibility-modifier="PRIVATE_FIELD"><rect fill="none" height="6" style="stroke:#C82930;stroke-width:1;" width="6" x="27188.08" y="1509.7603"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="92.8867" x="27200.08" y="1516.107">language: str</text><line style="stroke:#181818;stroke-width:0.5;" x1="27181.08" x2="27328.9247" y1="1523.4088" y2="1523.4088"/></g><g class="entity" data-qualified-name="langchain-community - Document Processing.LoaderNote" data-source-line="1027" id="ent0183"><path d="M26529.28,850.855 L26529.28,1193.7769 L26898.7219,1193.7769 L26898.7219,860.855 L26888.7219,850.855 L26529.28,850.855" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M26888.7219,850.855 L26888.7219,860.855 L26898.7219,860.855 L26888.7219,850.855" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.4419" x="26535.28" y="867.9219">Document Loader categories (langchain-community):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.6499" x="26543.5446" y="883.0547">Core files : TextLoader, CSVLoader, JSONLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.2437" x="26597.2649" y="898.1875">BSHTMLLoader, UnstructuredFileLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="104.9585" x="26597.2649" y="913.3203">DirectoryLoader</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328.5103" x="26543.5446" y="928.4531">PDFs       : PyPDFLoader (default), PyMuPDFLoader</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.9609" x="26597.2649" y="943.586">(fast), PDFPlumberLoader (tables),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.71" x="26597.2649" y="958.7188">PDFMinerLoader, PyPDFDirectoryLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.4028" x="26597.2649" y="973.8516">PyPDFium2Loader</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.6563" x="26543.5446" y="988.9844">Web        : WebBaseLoader, RecursiveUrlLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.8872" x="26597.2649" y="1004.1172">SitemapLoader, FirecrawlLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="198.834" x="26597.2649" y="1019.25">WikipediaLoader, ArxivLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.1948" x="26597.2649" y="1034.3828">YoutubeTranscriptLoader</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="288.2979" x="26543.5446" y="1049.5156">Cloud      : S3FileLoader, S3DirectoryLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129.3906" x="26597.2649" y="1064.6485">GoogleDriveLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.6558" x="26597.2649" y="1079.7813">AzureBlobStorageLoader</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.7642" x="26543.5446" y="1094.9141">Productivity: NotionDirectoryLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.6992" x="26597.2649" y="1110.0469">ConfluenceLoader, SlackDirectoryLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.1021" x="26597.2649" y="1125.1797">GithubFileLoader,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="197.1772" x="26597.2649" y="1140.3125">UnstructuredMarkdownLoader</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="335.4609" x="26535.28" y="1155.4453">Use load() for small sets; lazy_load() for large ones.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.8838" x="26535.28" y="1170.5781">load_and_split() is DEPRECATED - call load() then</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.2358" x="26535.28" y="1185.711">splitter.split_documents() separately.</text></g><g class="entity" data-qualified-name="langchain-community - Document Processing.SplitterNote" data-source-line="1052" id="ent0184"><path d="M26934.13,873.555 L26934.13,1171.0784 L27327.8771,1171.0784 L27327.8771,883.555 L27317.8771,873.555 L26934.13,873.555" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M27317.8771,873.555 L27317.8771,883.555 L27327.8771,883.555 L27317.8771,873.555" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.1563" x="26940.13" y="890.6219">Text Splitter categories (langchain-text-splitters):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.7407" x="26948.3946" y="905.7547">Text-structure (recommended default):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.0137" x="26956.6593" y="920.8875">RecursiveCharacterTextSplitter</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.6445" x="26964.9239" y="936.0203">-&gt; use from_language() for source code</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.6724" x="26977.3209" y="951.1531">(Python, JS, TS, Markdown, HTML, Go ...)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.3804" x="26948.3946" y="966.286">Length-based:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.8975" x="26956.6593" y="981.4188">CharacterTextSplitter  (single separator)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="203.6455" x="26956.6593" y="996.5516">TokenTextSplitter      (tiktoken)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.542" x="26956.6593" y="1011.6844">SentenceTransformersTokenTextSplitter</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.7539" x="26948.3946" y="1026.8172">Document-structure (standalone, not TextSplitter):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="356.2178" x="26956.6593" y="1041.95">MarkdownHeaderTextSplitter  (# / ## / ### headers)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="267.9473" x="26956.6593" y="1057.0828">HTMLHeaderTextSplitter      (h1..h4 tags)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.4492" x="26956.6593" y="1072.2156">RecursiveJsonSplitter       (JSON objects/arrays)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129.8921" x="26948.3946" y="1087.3485">Sentence-level NLP:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.1821" x="26956.6593" y="1102.4813">SpacyTextSplitter  (spaCy pipeline)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.8892" x="26956.6593" y="1117.6141">NLTKTextSplitter   (NLTK punkt)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="362.3623" x="26940.13" y="1132.7469">MarkdownHeaderTextSplitter, HTMLHeaderTextSplitter,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="347.9277" x="26940.13" y="1147.8797">and RecursiveJsonSplitter are standalone classes and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="181.9048" x="26940.13" y="1163.0125">do NOT extend TextSplitter.</text></g><!--class BaseCallbackHandler--><g class="entity" data-qualified-name="langchain-core - Callbacks.BaseCallbackHandler" data-source-line="1124" id="ent0225"><rect fill="#E8F4FD" height="210.9688" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="180.6201" x="5846.69" y="916.835"/><ellipse cx="5861.69" cy="932.835" fill=