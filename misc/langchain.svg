g" textLength="142.7969" x="14280.2639" y="1034.3872">model="gpt-4o-mini",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.9658" x="14280.2639" y="1049.52">trigger=("tokens", 4000),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.979" x="14280.2639" y="1064.6528">keep=("messages", 20)),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.4922" x="14271.9993" y="1079.7856">HumanInTheLoopMiddleware(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.4365" x="14280.2639" y="1094.9185">interrupt_on={"send_email": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.0044" x="14288.5286" y="1110.0513">"allowed_decisions": ["approve","edit","reject"]}}),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="9.2041" x="14263.7346" y="1125.1841">],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="14255.47" y="1140.3169">)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.8247" x="14255.47" y="1155.4497">result = agent.invoke({"messages": [...]})</text></g><g class="entity" data-qualified-name="GMN367" data-source-line="1950" id="ent0368"><path d="M27365.1,1395.315 L27365.1,1586.9088 L27680.9042,1586.9088 L27680.9042,1405.315 L27670.9042,1395.315 L27365.1,1395.315" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M27670.9042,1395.315 L27670.9042,1405.315 L27680.9042,1405.315 L27670.9042,1395.315" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.7236" x="27371.1" y="1412.3819">Node function signatures (all optional args):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="89.3306" x="27379.3646" y="1427.5147">def my_node(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79.9868" x="27387.6293" y="1442.6475">state: State,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.7144" x="27387.6293" y="1457.7803">config: RunnableConfig,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.7314" x="27387.6293" y="1472.9131">runtime: Runtime[Ctx],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="25.981" x="27379.3646" y="1488.046">): ...</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.7227" x="27371.1" y="1503.1788">Subgraph as a node:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.5396" x="27379.3646" y="1518.3116">graph.add_node("sub", compiled_subgraph)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.0439" x="27371.1" y="1533.4444">Node caching:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0825" x="27379.3646" y="1548.5772">graph.add_node("n", fn,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.9028" x="27387.6293" y="1563.71">cache_policy=CachePolicy(ttl=60))</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.4741" x="27379.3646" y="1578.8428">graph.compile(cache=InMemoryCache())</text></g><g class="entity" data-qualified-name="GMN370" data-source-line="1965" id="ent0371"><path d="M14671.51,941.655 L14671.51,1102.9831 L14962.4885,1102.9831 L14962.4885,951.655 L14952.4885,941.655 L14671.51,941.655" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M14952.4885,941.655 L14952.4885,951.655 L14962.4885,951.655 L14952.4885,941.655" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.3623" x="14677.51" y="958.7219">Thread-level per-conversation memory.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.1157" x="14677.51" y="973.8547">thread_id required in configurable dict.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.105" x="14677.51" y="988.9875">For time-travel also pass checkpoint_id:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.2061" x="14685.7746" y="1004.1203">{"configurable": {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.0947" x="14694.0393" y="1019.2531">"thread_id": "1",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.729" x="14694.0393" y="1034.386">"checkpoint_id": "abc123"}}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.9785" x="14677.51" y="1049.5188">InMemorySaver is the correct v1.0 name.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.3198" x="14677.51" y="1064.6516">(MemorySaver was the old name.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.1152" x="14677.51" y="1079.7844">SqliteSaver and PostgresSaver live in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.6748" x="14677.51" y="1094.9172">SEPARATE pip packages.</text></g><!--reverse link Runnable to RunnableSerializable--><g class="link" da