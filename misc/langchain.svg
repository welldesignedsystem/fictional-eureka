erif" font-size="14" lengthAdjust="spacing" textLength="253.2783" x="13334.36" y="1526.2545">prompt: str or BasePromptTemplate</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="13325.36" cy="1539.2047" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="248.4043" x="13334.36" y="1542.5514">response_format: Type[BaseModel]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="146.1455" x="13320.36" y="1579.1451">CompiledStateGraph</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="13315.36" x2="13428.672" y1="1558.0016" y2="1558.0016"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="13428.672" y="1562.3482">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="13479.3263" x2="13592.6383" y1="1558.0016" y2="1558.0016"/></g><!--class entrypoint_decorator--><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.entrypoint_decorator" data-source-line="1558" id="ent0310"><rect fill="#F5F0FF" height="109.1875" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="253.459" x="16353.27" y="1436.515"/><ellipse cx="16401.935" cy="1452.515" fill="#7B2FBE" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M16406.1694,1448.2806 L16400.8882,1448.2806 L16400.8882,1450.9525 L16405.685,1450.9525 L16405.685,1453.1088 L16400.8882,1453.1088 L16400.8882,1458.515 L16398.4507,1458.515 L16398.4507,1446.1244 L16406.1694,1446.1244 L16406.1694,1448.2806 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.6289" x="16422.435" y="1457.3617">entrypoint_decorator</text><line style="stroke:#181818;stroke-width:0.5;" x1="16354.27" x2="16605.729" y1="1468.515" y2="1468.515"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="16364.27" cy="1482.1634" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.459" x="16373.27" y="1485.5101">checkpointer: BaseCheckpointer</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="16364.27" cy="1498.4603" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="116.2861" x="16373.27" y="1501.807">store: BaseStore</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.0977" x="16359.27" y="1538.4007">CompiledEntrypoint</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="16354.27" x2="16454.6723" y1="1517.2572" y2="1517.2572"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="16454.6723" y="1521.6039">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="16505.3266" x2="16605.729" y1="1517.2572" y2="1517.2572"/></g><!--class task_decorator--><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.task_decorator" data-source-line="1574" id="ent0311"><rect fill="#F5F0FF" height="76.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="136.3779" x="16641.81" y="1452.815"/><ellipse cx="16656.81" cy="1468.815" fill="#7B2FBE" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M16661.0444,1464.5806 L16655.7631,1464.5806 L16655.7631,1467.2525 L16660.56,1467.2525 L16660.56,1469.4088 L16655.7631,1469.4088 L16655.7631,1474.815 L16653.3256,1474.815 L16653.3256,1462.4244 L16661.0444,1462.4244 L16661.0444,1464.5806 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.3779" x="16670.81" y="1473.6617">task_decorator</text><line style="stroke:#181818;stroke-width:0.5;" x1="16642.81" x2="16777.1879" y1="1484.815" y2="1484.815"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="32.5322" x="16647.81" y="1522.107">Task</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="16642.81" x2="16684.6718" y1="1500.9634" y2="1500.9634"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.6543" x="16684.6718" y="1505.3101">returns</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="16735.3261" x2="16777.1879" y1="1500.9634" y2="1500.9634"/></g><g class="entity" data-qualified-name="langgraph 1.0 - Functional API.FuncAPINote" data-source-line="1589" id="ent0312"><path d="M16812.85,1372.615 L16812.85,1609.6072 L17137.1474,1609.6072 L17137.1474,1382.615 L17127.1474,1372.615 L16812.85,1372.615" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M17127.1474,1372.615 L17127.1474,1382.615 L17137.1474,1382.615 L17127.1474,1372.615" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.9678" x="16818.85" y="1389.6819">Functional API vs Graph API:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="16818.85" y="1404.8147">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.9863" x="16818.85" y="1419.9475">Functional API (@entrypoint + @task):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.5981" x="16827.1146" y="1435.0803">Pythonic; plain functions, no state schema,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.5913" x="16827.1146" y="1450.2131">no explicit nodes or edges. Best for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.0571" x="16827.1146" y="1465.346">linear or simple flows.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="16818.85" y="1480.4788">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.5171" x="16818.85" y="1495.6116">Graph API (StateGraph):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.7192" x="16827.1146" y="1510.7444">Explicit typed State, nodes, edges, reducers.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.9844" x="16827.1146" y="1525.8772">Use when you need conditional routing,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293.2871" x="16827.1146" y="1541.01">parallel branches, subgraphs, or fine-grained</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.5439" x="16827.1146" y="1556.1428">state control.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="16818.85" y="1571.2756">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.29" x="16818.85" y="1586.4085">Both fully support: checkpointing, streaming,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.2974" x="16818.85" y="1601.5413">interrupt(), human-in-the-loop, and BaseStore.</text></g><g class="entity" data-qualified-name="PackageNote" data-source-line="21" id="ent0002"><path d="M11637.63,175.375 L11637.63,715.0234 L12162.38,715.0234 L12162.38,185.375 L12152.38,175.375 L11637.63,175.375" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M12152.38,175.375 L12152.38,185.375 L12162.38,185.375 L12152.38,175.375" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.0708" x="11643.63" y="192.4419">Modern install (v1.0):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.1055" x="11651.8946" y="207.5747">pip install langchain langchain-core</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.439" x="11651.8946" y="222.7075">pip install langchain-openai (or langchain-anthropic, etc.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.415" x="11651.8946" y="237.8403">pip install langgraph</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.5811" x="11651.8946" y="252.9731">pip install langgraph-checkpoint-sqlite   (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.416" x="11651.8946" y="268.106">pip install langgraph-checkpoint-postgres (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="11643.63" y="283.2388">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.1113" x="11643.63" y="298.3716">Key import paths:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.915" x="11651.8946" y="313.5044">Runnable / LCEL primitives   -&gt; langchain_core.runnables</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="421.7573" x="11651.8946" y="328.6372">Base model abstractions      -&gt; langchain_core.language_models</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.7905" x="11651.8946" y="343.77">Messages                     -&gt; langchain_core.messages</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="348.5562" x="11651.8946" y="358.9028">Document                     -&gt; langchain_core.documents</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.2358" x="11651.8946" y="374.0356">Prompts                      -&gt; langchain_core.prompts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="379.6216" x="11651.8946" y="389.1685">Output parsers               -&gt; langchain_core.output_parsers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.4448" x="11651.8946" y="404.3013">Tools + @tool decorator      -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.3047" x="11651.8946" y="419.4341">Injected tool args           -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="361.3784" x="11651.8946" y="434.5669">Embeddings                   -&gt; langchain_core.embeddings</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.2695" x="11651.8946" y="449.6997">Retrieval                    -&gt; langchain_core.retrievers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="351.2031" x="11651.8946" y="464.8325">Chat history                 -&gt; langchain_core.chat_history</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.6504" x="11651.8946" y="479.9653">Callbacks                    -&gt; langchain_core.callbacks</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.1255" x="11651.8946" y="495.0981">Agents (high-level)          -&gt; langchain.agents [create_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="387.5562" x="11651.8946" y="510.231">Middleware classes            -&gt; langchain.agents.middleware</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="408.9604" x="11651.8946" y="525.3638">Middleware hook decorators   -&gt; langchain.agents.middleware</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="386.2993" x="11651.8946" y="540.4966">Graph API (low-level)        -&gt; langgraph.graph [StateGraph]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="477.6294" x="11651.8946" y="555.6294">Prebuilt nodes               -&gt; langgraph.prebuilt [ToolNode, tools_condition]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="415.873" x="11651.8946" y="570.7622">Functional API               -&gt; langgraph.func [@entrypoint, @task]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="433.9766" x="11651.8946" y="585.895">Prebuilt agent               -&gt; langgraph.prebuilt [create_react_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="491.1563" x="11651.8946" y="601.0278">Graph types/primitives       -&gt; langgraph.types [Command, Send, interrupt]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="376.416" x="11651.8946" y="616.1606">Runtime context              -&gt; langgraph.runtime [Runtime]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="452.1309" x="11651.8946" y="631.2935">Managed state values         -&gt; langgraph.managed [RemainingSteps]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" text