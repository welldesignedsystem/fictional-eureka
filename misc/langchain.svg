="1531.5556"/></g><!--class hook_config_decorator--><g class="entity" data-qualified-name="langchain 1.0 - Middleware Support Types.hook_config_decorator" data-source-line="862" id="ent0197"><rect fill="#FFF0E8" height="64.2969" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="190.8604" x="10751.57" y="1458.965"/><ellipse cx="10766.57" cy="1474.965" fill="#FF8800" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M10770.8044,1470.7306 L10765.5231,1470.7306 L10765.5231,1473.4025 L10770.32,1473.4025 L10770.32,1475.5588 L10765.5231,1475.5588 L10765.5231,1480.965 L10763.0856,1480.965 L10763.0856,1468.5744 L10770.8044,1468.5744 L10770.8044,1470.7306 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="158.8604" x="10780.57" y="1479.8117">hook_config_decorator</text><line style="stroke:#181818;stroke-width:0.5;" x1="10752.57" x2="10941.4304" y1="1490.965" y2="1490.965"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="10762.57" cy="1504.6134" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="151.5938" x="10771.57" y="1507.9601">can_jump_to: List[str]</text><line style="stroke:#181818;stroke-width:0.5;" x1="10752.57" x2="10941.4304" y1="1515.2619" y2="1515.2619"/></g><g class="entity" data-qualified-name="langchain 1.0 - Middleware Support Types.JumpNote" data-source-line="876" id="ent0198"><path d="M10542.79,1702.995 L10542.79,1894.5888 L10913.2094,1894.5888 L10913.2094,1712.995 L10903.2094,1702.995 L10542.79,1702.995" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M10903.2094,1702.995 L10903.2094,1712.995 L10913.2094,1712.995 L10903.2094,1702.995" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.5127" x="10548.79" y="1720.0619">Agent jump system - short-circuit the loop:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.5449" x="10548.79" y="1735.1947">Any node-style hook can return "jump_to" to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.2842" x="10548.79" y="1750.3275">redirect execution:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.6665" x="10557.0546" y="1765.4603">return {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.3408" x="10565.3193" y="1780.5931">"messages": [...],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.2368" x="10565.3193" y="1795.726">"jump_to": "end"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="10557.0546" y="1810.8588">}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.3755" x="10548.79" y="1825.9916">Valid targets:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.3076" x="10557.0546" y="1841.1244">"end"   -&gt; skip to after_agent (or END node)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189.2427" x="10557.0546" y="1856.2572">"tools" -&gt; jump to tools node</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.4224" x="10557.0546" y="1871.39">"model" -&gt; jump to model node</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="349.4194" x="10548.79" y="1886.5228">The hook MUST declare can_jump_to via hook_config.</text></g><!--class AgentMiddleware--><g class="entity" data-qualified-name="langchain 1.0 - Agent Middleware.AgentMiddleware" data-source-line="901" id="ent0204"><rect fill="#F0FFF0" height="162.0781" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="562.1768" x="8678.91" y="941.285"/><ellipse cx="8894.7069" cy="957.285" fill="#A9DCDF" rx="11" ry="11" style="stroke:#181818;stroke-width:1;"/><path d="M8894.8163,952.6288 L8893.66,957.7069 L8895.9881,957.7069 L8894.8163,952.6288 Z M8893.3319,950.3944 L8896.3163,950.3944 L8899.6756,962.785 L8897.2225,962.785 L8896.4569,959.7225 L8893.1756,959.7225 L8892.4256,962.785 L8889.9881,962.785 L8893.3319,950.3944 Z " fill="#000000"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="122.083" x="8915.2069" y="962.1317">AgentMiddleware</text><line style="stroke:#181818;stroke-width:0.5;" x1="8679.91" x2="9240.0868" y1="973.285" y2="973.285"/><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="8689.91" cy="986.9334" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.6631" x="8698.91" y="990.2801">state_schema: Type</text><line style="stroke:#181818;stroke-width:0.5;" x1="8679.91" x2="9240.0868" y1="997.5819" y2="997.5819"/><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="8689.91" cy="1011.2303" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="394.29" x="8698.91" y="1014.577">before_agent(state: AgentState, runtime: Runtime): dict</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="8689.91" cy="1027.5272" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="397.4414" x="8698.91" y="1030.8739">before_model(state: AgentState, runtime: Runtime): dict</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="8689.