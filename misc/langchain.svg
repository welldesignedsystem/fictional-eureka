text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283.1245" x="9349.03" y="845.2247">from langchain.agents.middleware import (</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.6748" x="9357.2946" y="860.3575">before_agent, before_model,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.5269" x="9357.2946" y="875.4903">after_model,  after_agent,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="212.5576" x="9357.2946" y="890.6231">wrap_model_call, wrap_tool_call,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="113.769" x="9357.2946" y="905.756">dynamic_prompt,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="9349.03" y="920.8888">)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="9349.03" y="936.0216">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.9004" x="9349.03" y="951.1544">@before_model(can_jump_to=["end"])</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.4316" x="9349.03" y="966.2872">def check_limit(state: AgentState, runtime):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.5161" x="9365.5593" y="981.42">if len(state["messages"]) &gt;= 50:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.1743" x="9382.0886" y="996.5528">return {"jump_to": "end"}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="78.311" x="9365.5593" y="1011.6856">return None</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="9349.03" y="1026.8185">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="121.0117" x="9349.03" y="1041.9513">@wrap_model_call</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.5127" x="9349.03" y="1057.0841">def retry(request: ModelRequest, handler):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.3296" x="9365.5593" y="1072.2169">for i in range(3):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.54" x="9382.0886" y="1087.3497">try: return handler(request)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="82.4624" x="9382.0886" y="1102.4825">except: pass</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="9349.03" y="1117.6153">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.6367" x="9349.03" y="1132.7481">@dynamic_prompt</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.2461" x="9349.03" y="1147.881">def add_ctx(state: AgentState, runtime) -&gt; str:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.0195" x="9365.5593" y="1163.0138">return f"User: {runtime.context.user_id}"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="9349.03" y="1178.1466">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.7788" x="9349.03" y="1193.2794">Decorators and class instances can be mixed</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" text