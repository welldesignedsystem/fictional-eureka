font-size="13" lengthAdjust="spacing" textLength="279.5127" x="16973.79" y="1870.7338">Agent jump system - short-circuit the loop:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.5449" x="16973.79" y="1885.8666">Any node-style hook can return "jump_to" to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.2842" x="16973.79" y="1900.9994">redirect execution:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.6665" x="16982.0546" y="1916.1322">return {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.3408" x="16990.3193" y="1931.265">"messages": [...],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.2368" x="16990.3193" y="1946.3978">"jump_to": "end"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="16982.0546" y="1961.5306">}</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.3755" x="16973.79" y="1976.6635">Valid targets:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.3076" x="16982.0546" y="1991.7963">"end"   -&gt; skip to after_agent (or END node)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189.2427" x="16982.0546" y="2006.9291">"tools" -&gt; jump to tools node</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.4224" x="16982.0546" y="2022.0619">"model" -&gt; jump to model node</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="349.4194" x="16973.79" y="2037.1947">The hook MUST declare can_jump_to via hook_config.</text></g><!--class AgentMiddleware--><g 