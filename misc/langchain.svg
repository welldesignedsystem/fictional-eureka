">min_chunk_size: int</text><line style="stroke:#181818;stroke-width:0.5;" x1="26362.54" x2="26763.4531" y1="1046.4656" y2="1046.4656"/><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="26372.54" cy="1060.1141" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="215.5713" x="26381.54" y="1063.4607">split_json(json_data): List[Dict]</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="26372.54" cy="1076.4109" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="302.5449" x="26381.54" y="1079.7576">split_text(json_data, convert_lists): List[str]</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="26372.54" cy="1092.7078" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="376.9131" x="26381.54" y="1096.0545">create_documents(texts, metadatas): List[Document]</text></g><g class="entity" data-qualified-name="langchain-text-splitters.SplitterNote" data-source-line="1089" id="ent0214"><path d="M27493.92,889.8519 L27493.92,1187.3753 L28012.0811,1187.3753 L28012.0811,899.8519 L28002.0811,889.8519 L27493.92,889.8519" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M28002.0811,889.8519 L28002.0811,899.8519 L28012.0811,899.8519 L28002.0811,889.8519" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.1563" x="27499.92" y="906.9188">Text Splitter categories (langchain-text-splitters):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.7407" x="27508.1846" y="922.0516">Text-structure (recommended default):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.0137" x="27516.4493" y="937.1844">RecursiveCharacterTextSplitter</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.6445" x="27524.7139" y="952.3172">-&gt; use from_language() for source code</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.6724" x="27537.1109" y="967.45">(Python, JS, TS, Markdown, HTML, Go ...)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.3804" x="27508.1846" y="982.5828">Length-based:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.8975" x="27516.4493" y="997.7156">CharacterTextSplitter  (single separator)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="203.6455" x="27516.4493" y="1012.8485">TokenTextSplitter      (tiktoken)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.542" x="27516.4493" y="1027.9813">SentenceTransformersTokenTextSplitter</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129.8921" x="27508.1846" y="1043.1141">Sentence-level NLP:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.1821" x="27516.4493" y="1058.2469">SpacyTextSplitter  (spaCy pipeline)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.8892" x="27516.4493" y="1073.3797">NLTKTextSplitter   (NLTK punkt)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.4604" x="27508.1846" y="1088.5125">Document-structure (standalone, NOT a TextSplitter):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="35