ns-serif" font-size="13" lengthAdjust="spacing" textLength="221.457" x="12057.3346" y="1151.5891">edges, reducers, and typed State.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.0449" x="12049.07" y="1166.7219">Both support checkpointing, streaming,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.7314" x="12049.07" y="1181.8547">interrupt(), and human-in-the-loop.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.5811" x="12049.07" y="1196.9875">Choose Graph API when you need</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.4063" x="12049.07" y="1212.1203">conditional routing, parallel branches,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="89.6543" x="12049.07" y="1227.2531">or subgraphs.</text></g><g class="entity" data-qualified-name="PackageNote" data-source-line="19" id="ent0002"><path d="M10555.86,159.0781 L10555.86,607.9297 L11072.1486,607.9297 L11072.1486,169.0781 L11062.1486,159.0781 L10555.86,159.0781" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M11062.1486,159.0781 L11062.1486,169.0781 L11072.1486,169.0781 L11062.1486,159.0781" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.0708" x="10561.86" y="176.145">Modern install (v1.0):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.1055" x="10570.1246" y="191.2778">pip install langchain langchain-core</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="377.5713" x="10570.1246" y="206.4106">pip install langchain-openai  (or langchain-anthropic, etc.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.415" x="10570.1246" y="221.5435">pip install langgraph</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.5811" x="10570.1246" y="236.6763">pip install langgraph-checkpoint-sqlite   (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.416" x="10570.1246" y="251.8091">pip install langgraph-checkpoint-postgres (optional)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="10561.86" y="266.9419">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.1113" x="10561.86" y="282.0747">Key import paths:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="369.7827" x="10570.1246" y="297.2075">Runnable / LCEL primitives  -&gt; langchain_core.runnables</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="417.625" x="10570.1246" y="312.3403">Base model abstractions     -&gt; langchain_core.language_models</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.6582" x="10570.1246" y="327.4731">Messages                    -&gt; langchain_core.messages</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="317.1035" x="10570.1246" y="342.606">Prompts                     -&gt; langchain_core.prompts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="375.4893" x="10570.1246" y="357.7388">Output parsers              -&gt; langchain_core.output_parsers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="332.3125" x="10570.1246" y="372.8716">Tools + @tool decorator     -&gt; langchain_core.tools</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="437.5439" x="10570.1246" y="388.0044">Injected tool args          -&gt; langchain_core.tools (InjectedState etc.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="357.2461" x="10570.1246" y="403.1372">Embeddings                  -&gt; langchain_core.embeddings</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.1372" x="10570.1246" y="418.27">Retrieval                   -&gt; langchain_core.retrievers</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="347.0708" x="10570.1246" y="433.4028">Chat history                -&gt; langchain_core.chat_history</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.5181" x="10570.1246" y="448.5356">Callbacks                   -&gt; langchain_core.callbacks</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="391.9932" x="10570.1246" y="463.6685">Agents (high-level)         -&gt; langchain.agents [create_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="382.167" x="10570.1246" y="478.8013">Graph API (low-level)       -&gt; langgraph.graph [StateGraph]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="411.7407" x="10570.1246" y="493.9341">Functional API              -&gt; langgraph.func [@entrypoint, @task]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="429.8442" x="10570.1246" y="509.0669">Prebuilt agent              -&gt; langgraph.prebuilt [create_react_agent]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="487.0239" x="10570.1246" y="524.1997">Graph types/primitives      -&gt; langgraph.types [Command, Send, interrupt]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="372.2837" x="10570.1246" y="539.3325">Runtime context             -&gt; langgraph.runtime [Runtime]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="447.9985" x="10570.1246" y="554.4653">Managed state values        -&gt; langgraph.managed [RemainingSteps]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="374.8799" x="10570.1246" y="569.5981">Checkpointers               -&gt; langgraph.checkpoint.memory</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.6592" x="10698.2267" y="584.731">langgraph-checkpoint-sqlite (sep. pkg)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.7588" x="10698.2267" y="599.8638">langgraph-checkpoint-postgres (sep. pkg)</text></g><g class="entity" data-qualified-name="GMN25" data-source-line="163" id="ent0026"><path d="M13188.29,783.7181 L13188.29,839.1166 L13417.7153,839.1166 L13417.7153,793.7181 L13407.7153,783.7181 L13188.29,783.7181" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M13407.7153,783.7181 L13407.7153,793.7181 L13417.7153,793.7181 L13407.7153,783.7181" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.3267" x="13194.29" y="800.785">Built with the pipe operator:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.0098" x="13194.29" y="815.9178">prompt | model | parser</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.4253" x="13194.29" y="831.0506">Every step must be a Runnable.</text></g><g class="entity" data-qualified-name="GMN28" data-source-line="169" id="ent0029"><path d="M13453.05,768.5781 L13453.05,854.2422 L13696.9416,854.2422 L13696.9416,778.5781 L13686.9416,768.5781 L13453.05,768.5781" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M13686.9416,768.5781 L13686.9416,778.5781 L13696.9416,778.5781 L13686.9416,768.5781" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.6357" x="13459.05" y="785.645">Uses BaseChatMessageHistory to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="190.8169" x="13459.05" y="800.7778">inject and persist per-session</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.1987" x="13459.05" y="815.9106">messages around any Runnable.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.8916" x="13459.05" y="831.0435">Alternative to LangGraph memory</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.4126" x="13459.05" y="846.1763">for simpler LCEL chains.</text></g><g class="entity" data-qualified-name="GMN107" data-source-line="489" id="ent0108"><path d="M14206.34,1381.6681 L14206.34,1467.3322 L14499.6671,1467.3322 L14499.6671,1391.6681 L14489.6671,1381.6681 L14206.34,1381.6681" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M14489.6671,1381.6681 L14489.6671,1391.6681 L14499.6671,1391.6681 L14489.6671,1381.6681" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="37.6162" x="14212.34" y="1398.735">@tool</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.2686" x="14212.34" y="1413.8678">def search(query: str) -&gt; str:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2646" x="14212.34" y="1429.0006">&#160;&#160;</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="125.2266" x="14220.6046" y="1429.0006">"Search&#160;the&#160;web.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.9795" x="14345.8312" y="1429.0006">"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12.397" x="14220.6046" y="1444.1335">...</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.3271" x="14212.34" y="1459.2663">Wraps any function into a StructuredTool.</text></g><g class="entity" data-qualified-name="GMN110" data-source-line="497" id="ent0111"><path d="M13256,1808.9081 L13256,1840.1781 L13184.11,1844.1781 L13256,1848.1781 L13256,1879.4394 A0,0 0 0 0 13256,1879.4394 L13497.9937,1879.4394 A0,0 0 0 0 13497.9937,1879.4394 L13497.9937,1818.9081 L13487.9937,1808.9081 L13256,1808.9081 A0,0 0 0 0 13256,1808.9081" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M13487.9937,1808.9081 L13487.9937,1818.9081 L13497.9937,1818.9081 L13487.9937,1808.9081" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.9937" x="13262" y="1825.975">Annotated params are invisible to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.3457" x="13262" y="1841.1078">the LLM's tool schema but are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="212.5513" x="13262" y="1856.2406">auto-populated by LangGraph at</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.4404" x="13262" y="1871.3735">call time from graph state/store.</text></g><!--class Bas