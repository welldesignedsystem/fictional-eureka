18;stroke-width:0.5;" x1="7946.93" x2="8123.0755" y1="1474.0713" y2="1474.0713"/></g><g class="entity" data-qualified-name="GMN203" data-source-line="799" id="ent0204"><path d="M9980.89,587.8613 L9980.89,718.9238 L10295.1136,718.9238 L10295.1136,597.8613 L10285.1136,587.8613 L9980.89,587.8613" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M10285.1136,587.8613 L10285.1136,597.8613 L10295.1136,597.8613 L10285.1136,587.8613" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.4292" x="9986.89" y="604.9281">PRIMARY agent API in LangChain 1_0.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.646" x="9986.89" y="620.061">Returns a CompiledStateGraph (LangGraph).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="147.3862" x="9986.89" y="635.1938">agent = create_agent(</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="158.3804" x="9995.1546" y="650.3266">model="openai:gpt-4o",</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="100.0264" x="9995.1546" y="665.4594">tools=[search],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="284.959" x="9995.1546" y="680.5922">middleware=[SummarizationMiddleware()],</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="9986.89" y="695.725">)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.8247" x="9986.89" y="710.8578">result = agent.invoke({"messages": [...]})</text></g><g class="entity" data-qualified-name="GMN231" data-source-line="921" id="ent0232"><path d="M12654.42,1149.3413 L12654.42,1295.5366 L12901.5806,1295.5366 L12901.5806,1159.3413 L12891.5806,1149.3413 L12654.42,1149.3413" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M12891.5806,1149.3413 L12891.5806,1159.3413 L12901.5806,1159.3413 L12891.5806,1149.3413" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.2158" x="12660.42" y="1166.4081">LangGraph is the runtime for all</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="146.1357" x="12660.42" y="1181.541">new agents. Supports:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.3896" x="12668.6846" y="1196.6738">- Cycles + conditional branching</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="130.7363" x="12668.6846" y="1211.8066">- Human-in-the-loop</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.0718" x="12668.6846" y="1226.9394">- Time-travel / state inspection</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216.9883" x="12668.6846" y="1242.0722">- Persistent multi-thread memory</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.1606" x="12660.42" y="1257.205">create_agent() wraps this runtime.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218.8418" x="12660.42" y="1272.3378">create_react_agent() exposes the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.9458" x="12660.42" y="1287.4706">full graph API directly.</text></g><g class="entity" data-qualified-name="GMN234" data-source-line="933" id="ent0235"><path d="M9656.25,618.1213 L9656.25,649.3913 L9549.84,653.3913 L9656.25,657.3913 L9656.25,688.6525 A0,0 0 0 0 9656.25,688.6525 L9945.75