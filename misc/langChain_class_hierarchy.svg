StateGraph(State, context_schema=MyContext)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="128.6479" x="14208.81" y="1196.9875">Node-level caching:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="389.1177" x="14217.0746" y="1212.1203">graph.add_node("n", fn, cache_policy=CachePolicy(ttl=60))</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.4741" x="14217.0746" y="1227.2531">graph.compile(cache=InMemoryCache())</text></g><g class="entity" data-qualified-name="GMN254" data-source-line="1125" id="ent0255"><path d="M12129.61,761.0181 L12129.61,807.4081 L10709.79,811.4081 L12129.61,815.4081 L12129.61,861.815 A0,0 0 0 0 12129.61,861.815 L12448.3913,861.815 A0,0 0 0 0 12448.3913,861.815 L12448.3913,771.0181 L12438.3913,761.0181 L12129.61,761.0181 A0,0 0 0 0 12129.61,761.0181" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M12438.3913,761.0181 L12438.3913,771.0181 L12448.3913,771.0181 L12438.3913,761.0181" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.3623" x="12135.61" y="778.085">Thread-level per-conversation memory.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="219.1719" x="12135.61" y="793.2178">Stores full graph state snapshots.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.2119" x="12135.61" y="808.3506">Distinct from BaseStore which is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="212.145" x="12135.61" y="823.4835">cross-thread long-term memory.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.0376" x="12135.61" y="838.6163">SqliteSaver / PostgresSaver